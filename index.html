// Save a rolling backup of current cloud state to /users/{sk}_backup_<n>.
// Keeps 2 rolling backups (b1 and b2). Always overwrites the older one.
// Returns the backup slot used ("b1" or "b2") or null on failure.
async function saveCloudBackup(){
  const sk=getSyncKey();
  if(!sk)return null;
  try{
    // Fetch current cloud state
    const resp=await fetch(`${FB_URL}/users/${sk}.json`);
    const current=await resp.json();
    if(!current||typeof current!=="object")return null;
    // Determine which backup slot to overwrite (the older one)
    // We track which slot was last written via a tiny marker in each slot
    let useSlot="b1";
    try{
      const meta=await fetch(`${FB_URL}/users/${sk}_backup_meta.json`).then(r=>r.json());
      if(meta&&meta.last==="b1")useSlot="b2";
    }catch{}
    // Write the backup with a timestamp wrapper
    const wrapped={ts:new Date().toISOString(),data:current};
    await fetch(`${FB_URL}/users/${sk}_backup_${useSlot}.json`,{method:"PUT",body:JSON.stringify(wrapped)});
    await fetch(`${FB_URL}/users/${sk}_backup_meta.json`,{method:"PUT",body:JSON.stringify({last:useSlot,ts:new Date().toISOString()})});
    return useSlot;
  }catch(e){return null}
}

// Merge local history with cloud history. Dedup by date `d`. For overlapping
// dates, local wins (assumed to be more recent edits). Used by safe-push to
// ensure pushing never deletes cloud days that don't exist locally.
function mergeHistory(localHist,cloudHist){
  const byDate={};
  (cloudHist||[]).forEach(h=>{if(h&&h.d)byDate[h.d]=h});
  (localHist||[]).forEach(h=>{if(h&&h.d)byDate[h.d]=h}); // local overrides
  return Object.values(byDate).sort((a,b)=>a.d.localeCompare(b.d));
}
// Also accepts a `remote` object (from DB.pullAll) to catch any remote-only past-day data.
function rolloverPastDays(currentHistory,remote){
  const today=todayStr();
  const candidates=[]; // {date, data}
  // Local scan
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith("ph_today_")){
        const date=k.replace("ph_today_","");
        if(date<today){
          try{const data=JSON.parse(localStorage.getItem(k));if(data)candidates.push({date,data,localKey:k})}catch{}
        }
      }
    }
  }catch{}
  // Remote scan (from pulled Firebase object)
  if(remote&&typeof remote==="object"){
    Object.keys(remote).forEach(k=>{
      if(k.startsWith("today_")){
        const date=k.replace("today_","");
        if(date<today&&remote[k]){
          // Skip if already captured from local
          if(!candidates.some(c=>c.date===date))candidates.push({date,data:remote[k],remoteOnly:true});
        }
      }
    });
  }
  if(candidates.length===0)return currentHistory;

  const existingDates=new Set((currentHistory||[]).map(h=>h.d));
  const newEntries=[];
  const sk=getSyncKey();
  candidates.forEach(({date,data,localKey})=>{
    if(!existingDates.has(date)){
      const entry={d:date,...data};
      newEntries.push(entry);
      existingDates.add(date);
    }
    // Clean local
    if(localKey){
      try{localStorage.removeItem(localKey);localStorage.removeItem("ph_supps_"+date)}catch{}
    }
    // Clean remote (best-effort, async, don't block)
    if(sk){
      try{fetch(`${FB_URL}/users/${sk}/today_${date}.json`,{method:"DELETE"}).catch(()=>{})}catch{}
      try{fetch(`${FB_URL}/users/${sk}/supps_${date}.json`,{method:"DELETE"}).catch(()=>{})}catch{}
    }
  });

  if(newEntries.length===0)return currentHistory;
  const updated=[...(currentHistory||[]),...newEntries].sort((a,b)=>a.d.localeCompare(b.d));
  // Persist via DB (writes to both local + Firebase)
  DB.set("history",updated);
  return updated;
}
const predictG=(sl,st,as,al,ex)=>{let g=90;if(sl<6)g+=13;else if(sl<7)g+=8;else if(sl<7.5)g+=5;else if(sl<8)g+=2;g+=Math.min((st||4)-2,5);g+=Math.min(Math.max((as||0)-10,0)/4,5);g+=Math.min((al||0)*2.5,8);if(ex)g-=7;return Math.round(g)};

// BP averaging: only readings explicitly marked with `avg:true` are included.
// If nothing is marked, no average is computed (the banner shows "Nothing marked").
// Readings can also carry a `rested:true` flag (informational — 5-min rest protocol).
function bpAverage(readings){
  if(!readings||readings.length===0)return null;
  const marked=readings.filter(r=>r.avg);
  if(marked.length===0)return {n:0,total:readings.length,s:null,d:null,p:null};
  const avg=(field)=>{const vals=marked.map(r=>+r[field]).filter(v=>!isNaN(v));if(vals.length===0)return null;return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)};
  return {s:avg("s"),d:avg("d"),p:avg("p"),n:marked.length,total:readings.length};
}

// AI MEAL ANALYSIS (Priority 1 — v2)
// ============================================================
// Sends text or photo to Claude Sonnet, returns array of nutrition items.
// Uses Phil's stored foodref + profile so estimates match his actual products.
const MEAL_SYSTEM=`You are a nutrition analyst for a health tracking app. The user will describe a meal (text) or send a photo (of food or a nutrition label). You must return ONLY a valid JSON object in this exact format, with no prose, no markdown fences, no explanation:

{"items":[{"n":"item name","cal":0,"p":0,"ep":0,"ca":0,"fi":0,"as":0,"su":0,"fa":0,"sf":0,"na":0,"k":0,"cm":0,"fl":0,"note":"optional match note"}],"notes":"optional overall caveats"}

Field definitions (all numeric, per the portion actually consumed):
- n: short item name
- cal: calories (kcal)
- p: protein grams (raw)
- ep: effective protein grams (collagen counts at 50%, everything else = p)
- ca: carbohydrates grams (total)
- fi: fiber grams
- as: added sugar grams (NOT total sugar — only added)
- su: total sugars grams
- fa: fat grams (total)
- sf: saturated fat grams
- na: sodium mg
- k: potassium mg
- cm: calcium mg (estimate from the food — dairy is high, nuts/leafy greens moderate, meat low)
- fl: fluid ounces of liquid contributed by this item. Water=8oz/cup, milk=8oz/cup, coffee=8oz/cup, tea=8oz/cup, kefir=8oz/cup, coconut water=per serving, broth/soup=estimate liquid portion. Solid foods (salad, bread, meat) = 0. DO NOT count alcohol as fluid — set fl:0 for alcoholic drinks since alcohol is net-dehydrating.
- note: short string if you matched to a known product, made an assumption, or flagged a trap

Rules:
1. If the user's description matches a known product in the FOOD REFERENCE below, use those exact values and set "note":"matched: <product>".
2. If unsure about portion, assume one standard serving and say so in note.
3. Multiple items in one meal → multiple entries in the items array.
4. If the input is a photo of a nutrition label, extract values from the label (respect serving size — ask yourself: did the user eat one serving or the whole container? If unclear, assume one serving and note it).
5. If the input is a photo of food, estimate from visible portions.
6. Added sugar: if a product has added sugar you know about (dressings, sauces, yogurt), include it. Default to 0 only if you're confident there's none.
7. Effective protein (ep): collagen peptides = 50% of raw. Whey/meat/dairy/eggs/legumes = 100%. Mixed → weighted.
8. Return ONLY the JSON object. No backticks. No prose.`;

async function analyzeMeal({text,imageB64,imageMedia}){
  const key=LS.get("api_key");
  if(!key)throw new Error("No API key. Set one in Settings.");
  const profile=DB.get("profile")||"";
  const foodref=DB.get("foodref")||"";
  const sys=MEAL_SYSTEM+"\n\n=== USER PROFILE ===\n"+profile+"\n\n=== FOOD REFERENCE (known products) ===\n"+(foodref||"(no food reference loaded — make best-effort estimates)");
  const userContent=[];
  if(imageB64){
    userContent.push({type:"image",source:{type:"base64",media_type:imageMedia||"image/jpeg",data:imageB64}});
  }
  userContent.push({type:"text",text:text||"Analyze this meal and return the JSON."});
  const body={model:"claude-sonnet-4-20250514",max_tokens:1500,system:sys,messages:[{role:"user",content:userContent}]};
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"API error");
  let raw="";
  if(d.content&&Array.isArray(d.content)){raw=d.content.filter(b=>b.type==="text").map(b=>b.text).join("\n")}
  raw=raw.replace(/```json|```/g,"").trim();
  // Extract the first JSON object if the model added any stray text
  const m=raw.match(/\{[\s\S]*\}/);
  if(!m)throw new Error("Could not parse AI response: "+raw.slice(0,200));
  let parsed;
  try{parsed=JSON.parse(m[0])}catch(e){throw new Error("Invalid JSON from AI: "+e.message)}
  if(!parsed.items||!Array.isArray(parsed.items))throw new Error("AI response missing items array");
  // Normalize: ensure all numeric fields present
  const fields=["cal","p","ep","ca","fi","as","su","fa","sf","na","k","cm","fl"];
  parsed.items=parsed.items.map(it=>{
    const clean={n:it.n||"Item",note:it.note||""};
    fields.forEach(f=>{clean[f]=typeof it[f]==="number"?it[f]:(parseFloat(it[f])||0)});
    if(!it.ep&&it.p)clean.ep=clean.p;
    return clean;
  });
  return parsed;
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{const s=r.result;const i=s.indexOf(",");res({data:s.slice(i+1),media:file.type||"image/jpeg"})};
    r.onerror=()=>rej(new Error("Could not read file"));
    r.readAsDataURL(file);
  });
}

// Voice-to-fields parser. Sends a free-form spoken transcript to Claude Sonnet
// with a tight schema and returns a parsed JSON object. `kind` is "glucose" or "sleep".
async function parseVoiceFields(kind,transcript){
  const key=LS.get("api_key");
  if(!key)throw new Error("No API key. Set one in Settings.");
  let schema,instructions;
  if(kind==="glucose"){
    schema=`{"v":<number, glucose mg/dL>,"t":"<H:MM AM/PM or empty>"}`;
    instructions=`Extract a glucose reading and time from the transcript. The number is the glucose value in mg/dL (typical range 70-200). The time should be formatted "H:MM AM" or "H:MM PM" (e.g. "9:05 AM"). If no time mentioned, leave t empty.`;
  }else if(kind==="sleep"){
    schema=`{"sl":<hours as decimal, e.g. 8.25>,"ss":<sleep score 0-100>,"deep":<deep sleep minutes>,"rem":<REM minutes>,"light":<light sleep minutes>,"shr":<sleeping heart rate bpm>,"bed":"<bed time H:MM AM/PM>","wake":"<wake time H:MM AM/PM>"}`;
    instructions=`Extract Fitbit-style sleep data from the transcript. sl is total sleep duration in hours (decimal — "8 hours 15 minutes" → 8.25). ss is the sleep score (0-100). deep/rem/light are stage minutes. shr is sleeping heart rate. bed/wake are clock times like "10:45 PM" / "7:00 AM". Set any field to null if not mentioned.`;
  }else if(kind==="bp"){
    schema=`{"s":<systolic mmHg>,"d":<diastolic mmHg>,"p":<pulse bpm or null>,"t":"<H:MM AM/PM or empty>","rested":<true if user says rested/5min/seated, otherwise false>}`;
    instructions=`Extract a blood pressure reading from the transcript. Common phrasings: "one fifteen over seventy-two pulse sixty-eight" → s:115, d:72, p:68. "Rested" or "after five minutes" or "seated rest" → rested:true. Time like "seven thirty AM" formats as "7:30 AM". Pulse is optional.`;
  }else if(kind==="exercise"){
    const known=["Bench Press","Incline Press","Chest Fly","Shoulder Press","Triceps Extension","Chin-ups (assist)","Lat Pulldown","Rows","Bicep Curls","Squats","Calf Raises","1-mile Run","Zone 2 Walk"];
    schema=`{"exercises":[{"n":"<exercise name>","s":<sets number or null>,"r":<reps number or null>,"w":<weight in lb or null>,"m":<machine setting number or null>}]}`;
    instructions=`Extract a list of exercises from the transcript. Each exercise has a name (n), sets (s), reps (r), weight in pounds (w), and machine setting (m, optional — only for machines where the setting is a number on a dial, not the weight).

MATCH TO KNOWN EXERCISES (use these exact names when the user describes any of them):
${known.map(k=>"- "+k).join("\n")}

Matching rules:
- "bench" / "bench press" / "bench 130" → "Bench Press"
- "incline" / "incline bench" → "Incline Press"
- "fly" / "chest fly" / "pec fly" → "Chest Fly"
- "shoulder press" / "OHP" / "overhead press" → "Shoulder Press"
- "triceps" / "tricep extension" / "pushdown" → "Triceps Extension"
- "chin-up" / "chin ups" / "pull-up with assist" → "Chin-ups (assist)"
- "lat pulldown" / "pulldown" → "Lat Pulldown"
- "rows" / "rowing" / "cable row" / "seated row" → "Rows"
- "curls" / "bicep curls" / "biceps" → "Bicep Curls"
- "squats" / "squatting" → "Squats"
- "calf raise" / "calves" → "Calf Raises"
- "mile" / "ran a mile" / "one mile run" → "1-mile Run"
- "walk" / "zone two walk" → "Zone 2 Walk"
- If the user describes an exercise NOT on the list (e.g. "face pulls", "deadlift"), use their own name verbatim in title case.

Parsing rules:
- "three sets of ten at one thirty" → s:3, r:10, w:130
- "four by eight bench at one thirty-five" → s:4, r:8, w:135, matched to "Bench Press"
- "bench one thirty for three sets of ten" → s:3, r:10, w:130, matched to "Bench Press"
- "curls thirty pounds four sets eight reps" → s:4, r:8, w:30, matched to "Bicep Curls"
- "rows at fifty, three sets of ten" → s:3, r:10, w:50, matched to "Rows"
- "lat pulldown setting eleven, three by ten" → s:3, r:10, m:11, matched to "Lat Pulldown" (machine setting, not weight)
- "ran a mile" → n:"1-mile Run", s:null, r:null, w:null
- "squats bodyweight three sets of twenty" → s:3, r:20, w:null, matched to "Squats"
- If a field is not mentioned, set it to null. Do NOT guess.
- Return exercises in the order the user mentioned them.`;
  }else throw new Error("Unknown voice kind: "+kind);
  const sys=`You are a parser for a health tracking app. ${instructions}\n\nReturn ONLY a single valid JSON object matching this schema:\n${schema}\n\nNo prose, no markdown fences, no explanation. If a field is not mentioned in the transcript, set it to null. Numbers must be numbers, not strings.`;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:kind==="exercise"?1200:300,system:sys,messages:[{role:"user",content:transcript}]})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"API error");
  let raw="";
  if(d.content&&Array.isArray(d.content)){raw=d.content.filter(b=>b.type==="text").map(b=>b.text).join("\n")}
  raw=raw.replace(/```json|```/g,"").trim();
  const m=raw.match(/\{[\s\S]*\}/);
  if(!m)throw new Error("Could not parse: "+raw.slice(0,150));
  try{return JSON.parse(m[0])}catch(e){throw new Error("Invalid JSON: "+e.message)}
}

// Two scroll columns (hour, minute) + AM/PM toggle. Initializes to current time
// or the parsed `value` prop. Calls onChange("H:MM AM") whenever selection changes.
function TimePicker({value,onChange}){
  const parseTime=v=>{
    const now=new Date();
    if(!v)return {h:now.getHours()%12||12,m:now.getMinutes(),ap:now.getHours()>=12?"PM":"AM"};
    const match=String(v).match(/(\d+):(\d+)\s*(AM|PM)?/i);
    if(!match)return {h:now.getHours()%12||12,m:now.getMinutes(),ap:now.getHours()>=12?"PM":"AM"};
    let h=+match[1],m=+match[2];
    let ap=match[3]?match[3].toUpperCase():(h>=12?"PM":"AM");
    if(h>12)h=h-12;
    if(h===0)h=12;
    return {h,m,ap};
  };
  const init=parseTime(value);
  const [h,setH]=useState(init.h);
  const [m,setM]=useState(init.m);
  const [ap,setAp]=useState(init.ap);
  const hRef=useRef(null);
  const mRef=useRef(null);
  const ROW=40;

  // Position scroll columns to initial values on mount
  useEffect(()=>{
    if(hRef.current)hRef.current.scrollTop=(init.h-1)*ROW;
    if(mRef.current)mRef.current.scrollTop=init.m*ROW;
  },[]);

  // Push selection back up whenever it changes
  useEffect(()=>{
    onChange(`${h}:${String(m).padStart(2,"0")} ${ap}`);
  },[h,m,ap]);

  const hours=Array.from({length:12},(_,i)=>i+1);
  const minutes=Array.from({length:60},(_,i)=>i);

  const onScrollCol=(items,setter)=>e=>{
    const el=e.currentTarget;
    clearTimeout(el._timer);
    el._timer=setTimeout(()=>{
      const idx=Math.round(el.scrollTop/ROW);
      const clamped=Math.max(0,Math.min(idx,items.length-1));
      const val=items[clamped];
      if(val!=null)setter(val);
      // Snap to exact row position in case scroll-snap didn't finish
      const target=clamped*ROW;
      if(Math.abs(el.scrollTop-target)>2){el.scrollTop=target}
    },140);
  };

  const colStyle={height:ROW*4,overflowY:"scroll",scrollSnapType:"y mandatory",flex:1,textAlign:"center",fontFamily:"monospace",WebkitOverflowScrolling:"touch"};
  const rowStyle=active=>({height:ROW,lineHeight:ROW+"px",scrollSnapAlign:"center",color:active?C.teal:C.dim,fontWeight:active?700:400,fontSize:active?24:20,transition:"color 0.15s,font-size 0.15s"});
  const padStyle={height:ROW*1.5};

  const setNow=()=>{
    const now=new Date();
    const nh=now.getHours()%12||12;
    const nm=now.getMinutes();
    const nap=now.getHours()>=12?"PM":"AM";
    setH(nh);setM(nm);setAp(nap);
    if(hRef.current)hRef.current.scrollTop=(nh-1)*ROW;
    if(mRef.current)mRef.current.scrollTop=nm*ROW;
  };

  return React.createElement("div",{style:{background:C.card2,borderRadius:10,padding:10,border:`1px solid ${C.bdr}`}},
    React.createElement("button",{onClick:setNow,
      style:{marginBottom:10,width:"100%",background:"transparent",border:`1px solid ${C.teal}60`,borderRadius:6,padding:"8px",color:C.teal,fontSize:13,cursor:"pointer",fontFamily:"inherit"}},"⏱ Set to now"),
    React.createElement("div",{style:{display:"flex",gap:8,position:"relative",alignItems:"stretch"}},
      // Center highlight band (non-interactive overlay)
      React.createElement("div",{style:{position:"absolute",top:ROW*1.5,left:0,right:0,height:ROW,background:C.teal+"15",borderTop:`1px solid ${C.teal}50`,borderBottom:`1px solid ${C.teal}50`,pointerEvents:"none",borderRadius:4}}),
      // Hour column
      React.createElement("div",{ref:hRef,onScroll:onScrollCol(hours,setH),style:colStyle},
        React.createElement("div",{style:padStyle}),
        hours.map(i=>React.createElement("div",{key:i,style:rowStyle(i===h)},i)),
        React.createElement("div",{style:padStyle})
      ),
      React.createElement("div",{style:{alignSelf:"center",fontSize:24,color:C.dim,fontFamily:"monospace"}},":"),
      // Minute column
      React.createElement("div",{ref:mRef,onScroll:onScrollCol(minutes,setM),style:colStyle},
        React.createElement("div",{style:padStyle}),
        minutes.map(i=>React.createElement("div",{key:i,style:rowStyle(i===m)},String(i).padStart(2,"0"))),
        React.createElement("div",{style:padStyle})
      ),
      // AM/PM toggle
      React.createElement("div",{style:{display:"flex",flexDirection:"column",justifyContent:"center",gap:6,paddingLeft:4}},
        ["AM","PM"].map(x=>React.createElement("button",{key:x,onClick:()=>setAp(x),
          style:{padding:"12px 14px",background:ap===x?C.teal:C.bg,border:`1px solid ${ap===x?C.teal:C.bdr}`,borderRadius:6,color:ap===x?"#fff":C.dim,fontSize:14,fontWeight:700,cursor:"pointer",minWidth:52}},x))
      )
    )
  );
}

      const defaults=DB.get("ex_defaults")||{};

  },[et]);

  // Paste handler: when the Sleep sub-view is open, a pasted image (from
  // clipboard — e.g. after taking a Fitbit screenshot on Pixel) is fed
  // directly into the sleep-screenshot analyzer.
  useEffect(()=>{
    if(et!=="sleep")return;
    const onPaste=(ev)=>{
      const items=ev.clipboardData&&ev.clipboardData.items;
      if(!items)return;
      for(let i=0;i<items.length;i++){
        if(items[i].type&&items[i].type.startsWith("image/")){
          const file=items[i].getAsFile();
          if(file){ev.preventDefault();analyzeSleepPhotoFile(file);return}
        }
      }
    };
    window.addEventListener("paste",onPaste);
    return ()=>window.removeEventListener("paste",onPaste);
  },[et]);
  const [recording,setRecording]=useState(false);
  const userStoppedRef=useRef(false);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiPreview,setAiPreview]=useState(null);
  const [aiError,setAiError]=useState("");
  const photoInputRef=useRef(null);
  const recognitionRef=useRef(null);
  const pending=SUPPS.filter(s=>!supps[s.id]);
  const calT=data.ex?2000:1800;
  const [expandedSupp,setExpandedSupp]=useState(null);
  // Generic voice-to-fields state (used by glucose and sleep)
  const [voiceMode,setVoiceMode]=useState(null); // null | "glucose" | "sleep"
  const [voiceTranscript,setVoiceTranscript]=useState("");
  const [voiceParsing,setVoiceParsing]=useState(false);
  const [voiceError,setVoiceError]=useState("");
  // Sleep screenshot import state (Fitbit app screenshot → vision → fields)
  const [sleepPhotoLoading,setSleepPhotoLoading]=useState(false);
  const [sleepPhotoError,setSleepPhotoError]=useState("");
  const sleepPhotoRef=useRef(null);
  const analyzeSleepPhotoFile=async(file)=>{
    if(!file)return;
    setSleepPhotoError("");setSleepPhotoLoading(true);
    try{
      const {data,media}=await fileToBase64(file);
      const parsed=await analyzeSleepPhoto(data,media);
      if(parsed.sl!=null)setSh(String(parsed.sl));
      if(parsed.ss!=null)setSc(String(parsed.ss));
      if(parsed.deep!=null)setSdeep(String(parsed.deep));
      if(parsed.rem!=null)setSrem(String(parsed.rem));
      if(parsed.light!=null)setSlight(String(parsed.light));
      if(parsed.shr!=null)setSshr(String(parsed.shr));
      if(parsed.bed)setSbed(parsed.bed);
      if(parsed.wake)setSwake(parsed.wake);
    }catch(e){setSleepPhotoError(e.message||"Could not read screenshot")}
    setSleepPhotoLoading(false);
  };

  // Record voice into voiceTranscript and on stop, parse via Sonnet for the given kind.
  // KEY BEHAVIOR: Press once to start, press again to stop. The browser's Web Speech API
  // will auto-end on silence, so we track whether the user intentionally stopped and
  // restart the recognizer on silent endings to keep listening until a real user tap.
  const startVoiceCapture=(kind)=>{
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Speech recognition not supported. Use Chrome on Pixel.");return}
    // If already recording, this is a user-initiated STOP.
    if(recording&&recognitionRef.current){
      userStoppedRef.current=true;
      try{recognitionRef.current.stop()}catch(e){}
      return;
    }
    userStoppedRef.current=false;
    setVoiceError("");setVoiceTranscript("");setVoiceMode(kind);
    var finalText="";
    var startRec=function(){
      var rec=new SR();rec.continuous=true;rec.interimResults=true;rec.lang="en-US";
      rec.onresult=function(e){
        var interim="";
        for(var i=0;i<e.results.length;i++){
          if(e.results[i].isFinal)finalText+=e.results[i][0].transcript;
          else interim+=e.results[i][0].transcript;
        }
        setVoiceTranscript(finalText+interim);
      };
      rec.onerror=function(ev){
        // no-speech and aborted are normal during long silences — don't blow up
        if(ev.error==="no-speech"||ev.error==="aborted")return;
        userStoppedRef.current=true;
        setRecording(false);
        setVoiceError("Voice error: "+(ev.error||"unknown"));

// ============================================================
// HISTORY TAB — last 7 days of readable activity log
// ============================================================
// Shows today + last 6 history entries as a scrollable per-day log
// with sub-sections for Meals, Sleep, Glucose, BP, Exercise, Stress.
// Gracefully handles two shapes of history entries:
//   - New-style entries with full arrays (meals[], gReadings[], bpReadings[], exLog[], stReadings[])
//   - Old-style summary-only entries from imported JSON (scalar cal/p/g/bs/bd/pu/ex/st)
function HistoryTab({data,history}){
  const e=React.createElement;
  const today=todayStr();

  // Build list of days: today (from live td) + last 6 from history (excluding today if duplicated)
  const days=[];
  days.push({d:today,...data});
  const past=(history||[])
    .filter(h=>h&&h.d&&h.d!==today)
    .sort((a,b)=>b.d.localeCompare(a.d))
    .slice(0,6);
  days.push(...past);

  // Format a YYYY-MM-DD date as "Today" / "Yesterday" / "Tue, Apr 7"
  const fmtDate=(d)=>{
    if(d===today)return"Today";
    const dt=new Date(d+"T00:00:00");
    const t=new Date(today+"T00:00:00");
    const diff=Math.round((t-dt)/86400000);
    if(diff===1)return"Yesterday";
    return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  };

  // Format an ISO timestamp or "h:mm AM" string into a short time label
  const fmtTime=(t)=>{
    if(!t)return"";
    if(typeof t==="string"&&t.includes("M"))return t; // already human-readable like "9:30 AM"
    try{return new Date(t).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}catch{return""}
  };

  const sectionHeader=(icon,label)=>e("div",{style:{fontSize:11,color:C.dim,fontWeight:700,letterSpacing:0.5,marginTop:10,marginBottom:3,textTransform:"uppercase"}},`${icon} ${label}`);

  const renderDay=(entry)=>{
    const blocks=[];

    // ── Meals (explicit foods/drinks) ─────────
    const meals=entry.meals||[];
    if(meals.length>0){
      blocks.push(sectionHeader("🍽️",`Food & Drinks (${meals.length})`));
      meals.forEach((m,i)=>{
        const time=fmtTime(m.t);
        // Build compact macro tail: cal, protein, fluid
        const macros=[];
        if(m.cal)macros.push(`${Math.round(m.cal)}cal`);
        if(m.p)macros.push(`${Math.round(m.p)}p`);
        if(m.fl)macros.push(`${Math.round(m.fl)}oz`);
        blocks.push(e("div",{key:`m${i}`,style:{fontSize:14,color:C.txt,lineHeight:1.5,padding:"3px 0",display:"flex",gap:8,alignItems:"baseline"}},
          time&&e("span",{style:{color:C.dim,fontFamily:"monospace",fontSize:11,flexShrink:0,minWidth:60}},time),
          e("span",{style:{flex:1}},m.n||"Meal"),
          macros.length>0&&e("span",{style:{color:C.dim,fontSize:12,flexShrink:0}},macros.join(" · "))
        ));
        if(m.note){
          blocks.push(e("div",{key:`mn${i}`,style:{fontSize:11,color:C.dim,fontStyle:"italic",lineHeight:1.4,padding:"0 0 2px 68px"}},m.note));
        }
      });
    }else if(entry.cal){
      blocks.push(sectionHeader("🍽️","Daily Totals"));
      blocks.push(e("div",{key:"mtot",style:{fontSize:13,color:C.txt,lineHeight:1.5,padding:"2px 0"}},
        `${Math.round(entry.cal)} cal · ${Math.round(entry.p||0)}g prot · ${Math.round(entry.ca||0)}g carb · ${Math.round(entry.fi||0)}g fib · Na ${Math.round(entry.na||0)}`
      ));
    }

    // ── Vitamins & Meds (supEvents) ───────────
    const supEvents=entry.supEvents||[];
    if(supEvents.length>0){
      blocks.push(sectionHeader("💊",`Vitamins & Meds (${supEvents.length})`));
      supEvents.forEach((s,i)=>{
        const time=fmtTime(s.ts);
        const itemsText=Array.isArray(s.items)?s.items.join(", "):(s.items||"");
        blocks.push(e("div",{key:`sv${i}`,style:{fontSize:14,color:C.txt,lineHeight:1.5,padding:"3px 0",display:"flex",gap:8,alignItems:"baseline"}},
          time&&e("span",{style:{color:C.dim,fontFamily:"monospace",fontSize:11,flexShrink:0,minWidth:60}},time),
          e("span",{style:{flex:1}},s.name||"Supplement")
        ));
        if(itemsText){
          blocks.push(e("div",{key:`svi${i}`,style:{fontSize:12,color:C.dim,lineHeight:1.4,padding:"0 0 2px 68px"}},itemsText));
        }
      });
    }

    // ── Sleep ─────────────────────────────────
    if(entry.sl!=null||entry.ss!=null||entry.deep!=null){
      blocks.push(sectionHeader("😴","Sleep"));
      const main=[];
      if(entry.sl){
        const h=Math.floor(entry.sl);
        const mins=Math.round((entry.sl-h)*60);
        main.push(`${h}h${mins?" "+mins+"m":""}`);
      }
      if(entry.ss)main.push(`score ${entry.ss}`);
      blocks.push(e("div",{key:"sl",style:{fontSize:14,color:C.txt,lineHeight:1.5,padding:"2px 0"}},main.join(" · ")||"—"));
      const stages=[];
      if(entry.deep)stages.push(`Deep ${entry.deep}m`);
      if(entry.rem)stages.push(`REM ${entry.rem}m`);
      if(entry.light)stages.push(`Light ${entry.light}m`);
      if(entry.shr)stages.push(`HR ${entry.shr}`);
      if(stages.length>0){
        blocks.push(e("div",{key:"slst",style:{fontSize:12,color:C.dim,lineHeight:1.5,padding:"2px 0"}},stages.join(" · ")));
      }
    }

    // ── Glucose ───────────────────────────────
    const gReadings=entry.gReadings||[];
    if(gReadings.length>0){
      blocks.push(sectionHeader("🩸",`Glucose (${gReadings.length})`));
      gReadings.forEach((r,i)=>{
        blocks.push(e("div",{key:`g${i}`,style:{fontSize:14,color:C.txt,lineHeight:1.5,padding:"2px 0",display:"flex",gap:8,alignItems:"baseline"}},
          r.t&&e("span",{style:{color:C.dim,fontFamily:"monospace",fontSize:11,minWidth:60}},fmtTime(r.t)),
          e("span",{style:{fontWeight:600}},r.v)
        ));
      });
    }else if(entry.g!=null){
      blocks.push(sectionHeader("🩸","Glucose"));
      blocks.push(e("div",{key:"g0",style:{fontSize:14,color:C.txt,padding:"2px 0"}},`${entry.g} (fasting)`));
    }

    // ── Blood Pressure ────────────────────────
    const bpReadings=entry.bpReadings||[];
    if(bpReadings.length>0){
      blocks.push(sectionHeader("💓",`Blood Pressure (${bpReadings.length})`));
      bpReadings.forEach((r,i)=>{
        blocks.push(e("div",{key:`bp${i}`,style:{fontSize:14,color:C.txt,lineHeight:1.5,padding:"2px 0",display:"flex",gap:8,alignItems:"baseline"}},
          r.t&&e("span",{style:{color:C.dim,fontFamily:"monospace",fontSize:11,minWidth:60}},fmtTime(r.t)),
          e("span",{style:{fontWeight:600}},`${r.s}/${r.d}`),
          r.p&&e("span",{style:{color:C.dim,fontSize:12}},`pulse ${r.p}`),
          r.avg&&e("span",{style:{color:C.teal,fontSize:11}},"✓avg")
        ));
      });
    }else if(entry.bs!=null){
      blocks.push(sectionHeader("💓","Blood Pressure"));
      blocks.push(e("div",{key:"bp0",style:{fontSize:14,color:C.txt,padding:"2px 0"}},
        `${entry.bs}/${entry.bd||"—"}${entry.pu?` · pulse ${entry.pu}`:""}`));
    }

    // ── Exercise ──────────────────────────────
    const exLog=entry.exLog||[];
    if(exLog.length>0){
      blocks.push(sectionHeader("💪",`Exercise (${exLog.length})`));
      exLog.forEach((x,i)=>{
        const parts=[];
        if(x.s&&x.r)parts.push(`${x.s}×${x.r}`);
        else if(x.s)parts.push(`${x.s} sets`);
        else if(x.r)parts.push(`${x.r} reps`);
        if(x.w)parts.push(`@${x.w}`);
        if(x.m)parts.push(`set ${x.m}`);
        blocks.push(e("div",{key:`ex${i}`,style:{fontSize:14,color:C.txt,lineHeight:1.5,padding:"2px 0",display:"flex",gap:8,alignItems:"baseline"}},
          e("span",{style:{flex:1}},x.n||"Exercise"),
          parts.length>0&&e("span",{style:{color:C.dim,fontSize:12}},parts.join(" "))
        ));
      });
      if(entry.vl)blocks.push(e("div",{key:"exvl",style:{fontSize:12,color:C.dim,padding:"2px 0",fontStyle:"italic"}},`Volume load: ${Math.round(entry.vl).toLocaleString()} lb`));
    }else if(entry.ex||entry.vl||entry.ws){
      blocks.push(sectionHeader("💪","Exercise"));
      const parts=[];
      if(entry.ws)parts.push(`${entry.ws} sets`);
      if(entry.vl)parts.push(`${Math.round(entry.vl).toLocaleString()} lb volume`);
      blocks.push(e("div",{key:"ex0",style:{fontSize:13,color:parts.length?C.txt:C.dim,padding:"2px 0"}},parts.join(" · ")||"Yes (no details)"));
    }

    // ── Stress ────────────────────────────────
    const stReadings=entry.stReadings||[];
    if(stReadings.length>0){
      blocks.push(sectionHeader("🧠",`Stress (${stReadings.length})`));
      stReadings.forEach((r,i)=>{
        blocks.push(e("div",{key:`st${i}`,style:{fontSize:14,color:C.txt,lineHeight:1.5,padding:"2px 0",display:"flex",gap:8,alignItems:"baseline"}},
          r.ts&&e("span",{style:{color:C.dim,fontFamily:"monospace",fontSize:11,minWidth:60}},fmtTime(r.ts)),
          e("span",{style:{fontWeight:600}},r.v)
        ));
      });
    }else if(entry.st!=null&&typeof entry.st==="number"&&entry.st<=10){
      // Guard: `st` is also used for Steps (Fitbit) when larger. Stress is 1-6.
      blocks.push(sectionHeader("🧠","Stress"));
      blocks.push(e("div",{key:"st0",style:{fontSize:14,color:C.txt,padding:"2px 0"}},entry.st));
    }

    // ── Notes (if present) ────────────────────
    if(entry.nt){
      blocks.push(sectionHeader("📝","Notes"));
      blocks.push(e("div",{key:"nt",style:{fontSize:13,color:C.txt,lineHeight:1.5,padding:"2px 0",fontStyle:"italic"}},entry.nt));
    }

    if(blocks.length===0){
      blocks.push(e("div",{key:"empty",style:{fontSize:13,color:C.dim,fontStyle:"italic",padding:"4px 0"}},"No data logged"));
    }

    return e("div",{key:entry.d,style:{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:12,border:`1px solid ${C.bdr}`}},
      e("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:6}},
        e("div",{style:{fontSize:17,fontWeight:700,color:C.teal}},fmtDate(entry.d)),
        e("div",{style:{fontSize:11,color:C.dim,fontFamily:"monospace"}},entry.d)
      ),
      ...blocks
    );
  };

  return e("div",{style:{padding:16}},
    e("div",{style:{fontSize:14,color:C.dim,marginBottom:12}},"Last 7 days of activity"),
    ...days.map(renderDay)
  );
}

// ============================================================
// AI CHAT
// ============================================================
function ChatDrawer({open,onClose,data,history}){
  const [msgs,setMsgs]=useState([]);
  const [inp,setInp]=useState("");
  const [loading,setLoading]=useState(false);
  const [needKey,setNeedKey]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight},[msgs]);
  useEffect(()=>{const k=LS.get("api_key");setNeedKey(!k)},[open]);

  const send=async()=>{
    if(!inp.trim()||loading)return;
    const key=LS.get("api_key");
    if(!key){setNeedKey(true);return}
    const userMsg=inp.trim();setInp("");
    setMsgs(p=>[...p,{role:"user",content:userMsg}]);setLoading(true);
    const ctx=`Today: Cal ${data.cal||0}, Prot ${data.p||0}g, Carbs ${data.ca||0}g, Fiber ${data.fi||0}g, Sugar ${data.as||0}g, Na ${data.na||0}mg, K ${data.k||0}mg, Glucose ${data.g||"?"}, Sleep ${data.sl||"?"}hr, Stress ${data.st||"?"}, Alcohol ${data.al||0}, Exercise ${data.ex?"yes":"no"}. Recent glucose: ${history.slice(-7).filter(d=>d.g).map(d=>fmtD(d.d)+":"+d.g).join(", ")}.`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:`You are a health assistant. ${DB.get("profile")||DEFAULT_PROFILE}\n\nCurrent:\n${ctx}\n\nBe concise, specific to the user's protocol.`,
          messages:[...msgs.map(m=>({role:m.role,content:m.content})),{role:"user",content:userMsg}]})});
      const d=await r.json();
      if(d.error){setMsgs(p=>[...p,{role:"assistant",content:`Error: ${d.error.message}`}])}
      else{const t=d.content?.map(b=>b.text||"").join("")||"No response";setMsgs(p=>[...p,{role:"assistant",content:t}])}
    }catch(e){setMsgs(p=>[...p,{role:"assistant",content:"Connection error. Check your API key and try again."}])}
    setLoading(false);
  };

  if(!open)return null;
  return React.createElement("div",{style:{position:"fixed",inset:0,background:C.bg+"f5",zIndex:100,display:"flex",flexDirection:"column"}},
    React.createElement("div",{style:{display:"flex",alignItems:"center",padding:"12px 16px",borderBottom:`1px solid ${C.bdr}`}},
      React.createElement("span",{style:{fontSize:15,fontWeight:700,flex:1}},"💬 Health Assistant"),
      React.createElement("button",{onClick:onClose,style:{background:"none",border:"none",color:C.dim,fontSize:20,cursor:"pointer"}},"✕")
    ),
    needKey&&React.createElement("div",{style:{padding:16}},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:10}},"Enter your Anthropic API Key"),
      React.createElement("div",{style:{fontSize:13,color:C.dim,marginBottom:12,lineHeight:1.5}},"Your key is stored only on this device in localStorage. It never leaves your phone except to call the API."),
      React.createElement("input",{type:"password",placeholder:"sk-ant-...",id:"apiKeyInput",style:{width:"100%",background:C.card2,border:`1px solid ${C.bdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:8}}),
      React.createElement(Btn,{onClick:()=>{const v=document.getElementById("apiKeyInput").value;if(v){LS.set("api_key",v);setNeedKey(false)}}},["Save Key"])
    ),
    !needKey&&React.createElement("div",{ref,style:{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10}},
      msgs.length===0&&React.createElement("div",{style:{color:C.dim,fontSize:15,textAlign:"center",marginTop:40}},"Ask about your health data, protocol, or targets."),
      msgs.map((m,i)=>React.createElement("div",{key:i,style:{alignSelf:m.role==="user"?"flex-end":"flex-start",background:m.role==="user"?C.teal:C.card,borderRadius:12,padding:"8px 12px",maxWidth:"85%",fontSize:16,lineHeight:1.6,whiteSpace:"pre-wrap"}},m.content)),
      loading&&React.createElement("div",{style:{alignSelf:"flex-start",background:C.card,borderRadius:12,padding:"8px 12px",fontSize:13,color:C.dim}},"Thinking...")
    ),
    !needKey&&React.createElement("div",{style:{padding:"10px 16px",borderTop:`1px solid ${C.bdr}`,display:"flex",gap:8}},
      React.createElement("input",{value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>e.key==="Enter"&&send(),placeholder:"Ask about your health...",
        style:{flex:1,background:C.card2,border:`1px solid ${C.bdr}`,borderRadius:20,padding:"12px 16px",color:C.txt,fontSize:16,outline:"none"}}),
      React.createElement("button",{onClick:send,disabled:loading,style:{background:C.teal,border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",fontSize:16}},"→")
    )
  );
}

function SettingsTab({history,setHistory}){

  const [hasFoodref,setHasFoodref]=useState(!!DB.get("foodref"));

  const [importText,setImportText]=useState("");
  const [showImport,setShowImport]=useState(false);
  const [delDate,setDelDate]=useState("");
  const [showRestoreBackup,setShowRestoreBackup]=useState(false);

  const doImport=async()=>{
    try{
      const data=JSON.parse(importText);
      if(data.history&&Array.isArray(data.history)){
        DB.set("history",data.history);
        setHistory(data.history);
        setHasHist(true);
      }
      if(data.profile){
        DB.set("profile",data.profile);
        setHasProfile(true);
      }
      if(data.foodref){
        DB.set("foodref",data.foodref);
        setHasFoodref(true);
      }
      setStatus("✓ Data imported! Pushing to cloud...");
      // Auto-push to Firebase if sync key exists
      var sk=getSyncKey();
      if(sk){try{var pushData={};if(data.history)pushData.history=data.history;if(data.profile)pushData.profile=data.profile;if(data.foodref)pushData.foodref=data.foodref;await fetch(FB_URL+"/users/"+sk+".json",{method:"PATCH",body:JSON.stringify(pushData)});setStatus("✓ Data imported and synced to cloud!")}catch(e){setStatus("✓ Imported locally. Cloud sync failed: "+e.message)}}
      else{setStatus("✓ Data imported locally. Set a sync key to sync to cloud.")}
      setImportText("");
      setShowImport(false);
      
    }catch(e){setStatus("❌ Invalid JSON. Copy the import data from Claude and try again.")}
  };

  const doExportAll=()=>{
    const exp={history:history,profile:DB.get("profile")||"",foodref:DB.get("foodref")||"",today:DB.get("today_"+todayStr())};
    var t=JSON.stringify(exp,null,2);
    navigator.clipboard.writeText(t).then(()=>{setStatus("✓ All data copied to clipboard")});
  };

  return React.createElement("div",{style:{padding:"12px 16px 100px",display:"flex",flexDirection:"column",gap:12}},
    React.createElement("div",{style:{fontSize:14,fontWeight:700}},"Settings"),

// MAIN APP
// ============================================================
function App(){
  const [tab,setTab]=useState("today");
  const [et,setEt]=useState(null); // sub-view selector for Today tab — lifted from TodayTab so swipe-back can manage it
  const [history,setHistory]=useState([]);
  const [td,setTd]=useState({cal:0,p:0,ep:0,ca:0,fi:0,as:0,su:0,fa:0,sf:0,na:0,k:0,cm:0,fl:0,g:null,gReadings:[],bs:null,bd:null,pu:null,bpt:null,bpReadings:[],sl:null,ss:null,deep:null,rem:null,light:null,shr:null,bed:null,wake:null,st:null,stReadings:[],al:0,alReadings:[],ex:false,exLog:[],wt:null,wtReadings:[],meals:[],supEvents:[]});
  const [supps,setSupps]=useState({});
  const [chatOpen,setChatOpen]=useState(false);
  const [loaded,setLoaded]=useState(false);

  // ============================================================
  // Swipe-back / Android system back gesture support
  // ============================================================
  // Strategy: maintain a "navigation stack" of forward actions (open sub-view,
  // change tab, open chat). Each forward action pushes a history.state entry.
  // popstate fires when the user swipes back from the right edge (or hits the
  // system back button), and we pop the most recent action off our stack.
  // When the stack is empty, popstate is allowed to bubble up to the browser,
  // which exits the app / returns to home screen.
  const navStackRef=useRef([]); // array of {kind, prev} entries
  const isPoppingRef=useRef(false); // guard against re-entry when we manually pop

  // Push a forward action onto the nav stack and into browser history
  const pushNav=(kind,prev)=>{
    navStackRef.current.push({kind,prev});
    try{window.history.pushState({navDepth:navStackRef.current.length},"")}catch(e){}
  };

  useEffect(()=>{
    // Seed the history with a baseline entry so the first popstate doesn't
    // accidentally exit when the user is already at the root
    try{window.history.replaceState({navDepth:0,baseline:true},"")}catch(e){}
    const onPop=(ev)=>{
      // If our nav stack has anything to undo, pop one frame and stay in app
      if(navStackRef.current.length>0){
        isPoppingRef.current=true;
        const frame=navStackRef.current.pop();
        // Restore the previous state for whatever was popped
        if(frame.kind==="chat")setChatOpen(false);
        else if(frame.kind==="subview")setEt(null);
        else if(frame.kind==="tab")setTab(frame.prev||"today");
        // After we pop, the browser is now one entry behind where we want to
        // be, because popstate already moved it. Push a placeholder so the
        // NEXT swipe still has something to pop, until the stack is empty.
        try{window.history.pushState({navDepth:navStackRef.current.length},"")}catch(e){}
        setTimeout(()=>{isPoppingRef.current=false},50);
      }else{
        // Stack empty → let it bubble (browser exits to home)
        // Do nothing — the popstate already happened, so we'd need to
        // re-trigger back. The cleanest way is to navigate back again.
        try{window.history.back()}catch(e){}
      }
    };
    window.addEventListener("popstate",onPop);
    return ()=>window.removeEventListener("popstate",onPop);
  },[]);

  // Wrap the state setters so user-initiated forward navigation pushes onto
  // the nav stack. We wrap, not replace, so internal calls (like popstate
  // unwinding) can still bypass via the isPoppingRef guard.
  const navSetEt=(newEt)=>{
    if(isPoppingRef.current){setEt(newEt);return}
    if(newEt&&newEt!==et){pushNav("subview",et)}
    setEt(newEt);
  };
  const navSetTab=(newTab)=>{
    if(isPoppingRef.current){setTab(newTab);return}
    // If tapping the same tab while a sub-view is open, close the sub-view
    if(newTab===tab&&tab==="today"&&et){setEt(null);return}
    if(newTab!==tab){
      // If switching away from Today and a sub-view is open, close it first
      if(et)setEt(null);
      pushNav("tab",tab);
    }
    setTab(newTab);
  };
  const navSetChatOpen=(open)=>{
    if(isPoppingRef.current){setChatOpen(open);return}
    if(open&&!chatOpen)pushNav("chat",false);
    setChatOpen(open);
  };

  useEffect(()=>{
    (async()=>{
      // Load from localStorage first (instant)
      const saved=DB.get("today_"+todayStr());
      if(saved)setTd(saved);
      const savedS=DB.get("supps_"+todayStr());
      if(savedS)setSupps(savedS);
      let h=DB.get("history");
      if(!h&&HIST.length>0){DB.set("history",HIST);h=HIST}
      // Rollover any past-day data sitting in localStorage into history
      h=rolloverPastDays(h||[],null);
      if(h&&h.length>0)setHistory(h);
      setLoaded(true);
      // Then pull from Firebase (may override with newer data)
      if(getSyncKey()){
        const remote=await DB.pullAll();
        if(remote){
          if(remote["today_"+todayStr()])setTd(remote["today_"+todayStr()]);
          if(remote["supps_"+todayStr()])setSupps(remote["supps_"+todayStr()]);
          if(remote.history&&remote.history.length>0){h=remote.history;LS.set("history",h)}
          if(remote.profile)LS.set("profile",remote.profile);
          if(remote.foodref)LS.set("foodref",remote.foodref);
          // Second rollover pass now that we have remote data
          h=rolloverPastDays(h||[],remote);
          if(h&&h.length>0)setHistory(h);
        }
      }
    })();
  },[]);

  useEffect(()=>{if(loaded)DB.set("today_"+todayStr(),td)},[td,loaded]);
  useEffect(()=>{if(loaded)DB.set("supps_"+todayStr(),supps)},[supps,loaded]);

  // Accumulator: apply a meal's nutrition onto a td-like object and append to meals[].
  // Used by both addMeal (today) and addMealToDate (past days).
  const accumMeal=(p,m,ts)=>({
    ...p,
    cal:(p.cal||0)+(m.cal||0),
    p:(p.p||0)+(m.p||0),
    ep:(p.ep||0)+(m.ep||m.p||0),
    ca:(p.ca||0)+(m.ca||0),
    fi:(p.fi||0)+(m.fi||0),
    as:(p.as||0)+(m.as||0),
    su:(p.su||0)+(m.su||0),
    fa:(p.fa||0)+(m.fa||0),
    sf:(p.sf||0)+(m.sf||0),
    na:(p.na||0)+(m.na||0),
    k:(p.k||0)+(m.k||0),
    cm:(p.cm||0)+(m.cm||0),
    fl:(p.fl||0)+(m.fl||0),
    meals:[...(p.meals||[]),{...m,t:ts}]
  });

  const addMeal=m=>{
    if(m.cal!=null){
      setTd(p=>accumMeal(p,m,new Date().toISOString()));
    }
  };

  // Backdate a meal to a prior day. Handles three cases:
  //   1. dateStr === today → delegate to addMeal (normal path)
  //   2. dateStr is a pending ph_today_YYYY-MM-DD (not yet rolled over) → update that bucket
  //   3. dateStr is already in history → update the matching history entry
  //      (if the date is absent from history, create a new entry for it)
  const addMealToDate=(dateStr,m)=>{
    if(m.cal==null)return;
    const today=todayStr();
    if(dateStr===today){addMeal(m);return}
    // Use noon of the backdated day as the meal timestamp so it lands on the right calendar day.
    const ts=new Date(dateStr+"T12:00:00").toISOString();
    // Case 2: pending day still in local bucket
    const pending=LS.get("today_"+dateStr);
    if(pending){
      const next=accumMeal(pending,m,ts);
      DB.set("today_"+dateStr,next);
      return;
    }
    // Case 3: update history entry (or create one)
    setHistory(prev=>{
      const list=prev||[];
      const idx=list.findIndex(h=>h.d===dateStr);
      let next;
      if(idx>=0){
        const updated={...accumMeal(list[idx],m,ts),d:dateStr};
        next=[...list];
        next[idx]=updated;
      }else{
        next=[...list,{...accumMeal({},m,ts),d:dateStr}].sort((a,b)=>a.d.localeCompare(b.d));
      }
      DB.set("history",next);
      return next;
    });
  };

  const addReading=r=>{/* readings stored with today data */};

  // Mark a supplement taken AND auto-log its associated meal (if any) AND
  // record a timestamped supplement/med event. Used by both the Today tab
  // "Supplements Remaining" grid and the Protocol tab checklist.
  const takeSupplement=(id)=>{
    const supp=SUPPS.find(s=>s.id===id);
    if(!supp)return;
    setSupps(p=>({...p,[id]:true}));
    if(supp.mealId){
      const meal=QMEALS.find(m=>m.id===supp.mealId);
      if(meal)addMeal(meal);
    }
    setTd(p=>({...p,supEvents:[...(p.supEvents||[]),{id:supp.id,name:supp.name,items:supp.items,ts:new Date().toISOString()}]}));
  };
  const untakeSupplement=(id)=>{
    // Just uncheck the box; don't retroactively remove logged meal or event.
    // (User can manually remove from Meals list or supEvents if needed.)
    setSupps(p=>({...p,[id]:false}));
  };

  const tabs=[{id:"today",l:"Today",i:"📊"},{id:"history",l:"History",i:"📜"},{id:"trends",l:"Trends",i:"📈"},{id:"alerts",l:"Alerts",i:"🔔"},{id:"protocol",l:"Protocol",i:"📋"},{id:"export",l:"Export",i:"📤"},{id:"settings",l:"Settings",i:"⚙️"}];

  if(!loaded)return React.createElement("div",{style:{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.teal}},"Loading...");

  return React.createElement("div",{style:{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",position:"relative"}},
    // Header
    React.createElement("div",{style:{padding:"14px 16px 8px",borderBottom:`1px solid ${C.bdr}33`,flexShrink:0}},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontSize:22,fontWeight:800,color:C.teal,letterSpacing:-0.5}},"HEALTH DASH"),
          React.createElement("div",{style:{fontSize:14,color:C.dim}},new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}))
        ),
        React.createElement("button",{onClick:()=>navSetChatOpen(true),style:{background:C.teal,border:"none",borderRadius:20,padding:"10px 16px",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}},"💬 AI Chat")
      )
    ),
    // Content
    React.createElement("div",{style:{flex:1,overflowY:"auto",paddingBottom:80}},
      tab==="today"&&React.createElement(TodayTab,{data:td,setData:setTd,supps,setSupps,takeSupplement,untakeSupplement,addMeal,addMealToDate,addReading,history,et,setEt:navSetEt}),
      tab==="history"&&React.createElement(HistoryTab,{data:td,history}),
      tab==="trends"&&React.createElement(TrendsTab,{history}),
      tab==="alerts"&&React.createElement(AlertsTab,{data:td}),
      tab==="protocol"&&React.createElement(ProtocolTab,{supps,setSupps,takeSupplement,untakeSupplement}),
      tab==="export"&&React.createElement(ExportTab,{data:td,history}),
      tab==="settings"&&React.createElement(SettingsTab,{history,setHistory}),
    ),
    // Tab bar - fixed at bottom
    React.createElement("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:C.card,borderTop:`1px solid ${C.bdr}`,display:"flex",paddingBottom:24,paddingTop:6,zIndex:50,maxWidth:480,margin:"0 auto"}},
      tabs.map(t=>React.createElement("button",{key:t.id,onClick:()=>navSetTab(t.id),style:{flex:1,background:"none",border:"none",padding:"10px 2px 6px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
        React.createElement("span",{style:{fontSize:22}},t.i),
        React.createElement("span",{style:{fontSize:12,fontWeight:tab===t.id?700:400,color:tab===t.id?C.teal:C.dim}},t.l)
      ))
    ),
    // Chat
    React.createElement(ChatDrawer,{open:chatOpen,onClose:()=>navSetChatOpen(false),data:td,history})
  );
}

try{ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App))}catch(e){document.getElementById("root").innerHTML='<div style="padding:20px;color:#f43f5e;font-size:14px;line-height:1.6"><b>Startup Error:</b><br>'+e.message+'</div>';}
</script>
</body>
</html>
