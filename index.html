// P5 — Daily rollover. Scans localStorage for any ph_today_YYYY-MM-DD keys from
// past dates, converts them to history entries, merges into history (dedup by date),
// deletes the stale keys locally AND remotely. Returns updated history array.
// Also accepts a `remote` object (from DB.pullAll) to catch any remote-only past-day data.
function rolloverPastDays(currentHistory,remote){
  const today=todayStr();
  const candidates=[]; // {date, data}
  // Local scan
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith("ph_today_")){
        const date=k.replace("ph_today_","");
        if(date<today){
          try{const data=JSON.parse(localStorage.getItem(k));if(data)candidates.push({date,data,localKey:k})}catch{}
        }
      }
    }
  }catch{}
  // Remote scan (from pulled Firebase object)
  if(remote&&typeof remote==="object"){
    Object.keys(remote).forEach(k=>{
      if(k.startsWith("today_")){
        const date=k.replace("today_","");
        if(date<today&&remote[k]){
          // Skip if already captured from local
          if(!candidates.some(c=>c.date===date))candidates.push({date,data:remote[k],remoteOnly:true});
        }
      }
    });
  }
  if(candidates.length===0)return currentHistory;

  const existingDates=new Set((currentHistory||[]).map(h=>h.d));
  const newEntries=[];
  const sk=getSyncKey();
  candidates.forEach(({date,data,localKey})=>{
    if(!existingDates.has(date)){
      const entry={d:date,...data};
      newEntries.push(entry);
      existingDates.add(date);
    }
    // Clean local
    if(localKey){
      try{localStorage.removeItem(localKey);localStorage.removeItem("ph_supps_"+date)}catch{}
    }
    // Clean remote (best-effort, async, don't block)
    if(sk){
      try{fetch(`${FB_URL}/users/${sk}/today_${date}.json`,{method:"DELETE"}).catch(()=>{})}catch{}
      try{fetch(`${FB_URL}/users/${sk}/supps_${date}.json`,{method:"DELETE"}).catch(()=>{})}catch{}
    }
  });

  if(newEntries.length===0)return currentHistory;
  const updated=[...(currentHistory||[]),...newEntries].sort((a,b)=>a.d.localeCompare(b.d));
  // Persist via DB (writes to both local + Firebase)
  DB.set("history",updated);
  return updated;
}
const predictG=(sl,st,as,al,ex)=>{let g=90;if(sl<6)g+=13;else if(sl<7)g+=8;else if(sl<7.5)g+=5;else if(sl<8)g+=2;g+=Math.min((st||4)-2,5);g+=Math.min(Math.max((as||0)-10,0)/4,5);g+=Math.min((al||0)*2.5,8);if(ex)g-=7;return Math.round(g)};

// Phil's BP protocol (from Health Plan v17): Omron upper-arm, 5-min rest,
// discard 1st reading, average 2nd+3rd. Stop at 2 if first is calm.
// Implementation: 1 reading = use it; 2 readings = average both; 3+ = discard 1st, average rest.
function bpAverage(readings){
  if(!readings||readings.length===0)return null;
  let used;
  if(readings.length===1)used=readings;
  else if(readings.length===2)used=readings;
  else used=readings.slice(1); // 3+: discard first
  const n=used.length;
  const avg=(field)=>{const vals=used.map(r=>+r[field]).filter(v=>!isNaN(v));if(vals.length===0)return null;return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)};
  return {s:avg("s"),d:avg("d"),p:avg("p"),n,total:readings.length};
}

// AI MEAL ANALYSIS (Priority 1 — v2)
// ============================================================
// Sends text or photo to Claude Sonnet, returns array of nutrition items.
// Uses Phil's stored foodref + profile so estimates match his actual products.
const MEAL_SYSTEM=`You are a nutrition analyst for a health tracking app. The user will describe a meal (text) or send a photo (of food or a nutrition label). You must return ONLY a valid JSON object in this exact format, with no prose, no markdown fences, no explanation:

{"items":[{"n":"item name","cal":0,"p":0,"ep":0,"ca":0,"fi":0,"as":0,"su":0,"fa":0,"sf":0,"na":0,"k":0,"note":"optional match note"}],"notes":"optional overall caveats"}

Field definitions (all numeric, per the portion actually consumed):
- n: short item name
- cal: calories (kcal)
- p: protein grams (raw)
- ep: effective protein grams (collagen counts at 50%, everything else = p)
- ca: carbohydrates grams (total)
- fi: fiber grams
- as: added sugar grams (NOT total sugar — only added)
- su: total sugars grams
- fa: fat grams (total)
- sf: saturated fat grams
- na: sodium mg
- k: potassium mg
- note: short string if you matched to a known product, made an assumption, or flagged a trap

Rules:
1. If the user's description matches a known product in the FOOD REFERENCE below, use those exact values and set "note":"matched: <product>".
2. If unsure about portion, assume one standard serving and say so in note.
3. Multiple items in one meal → multiple entries in the items array.
4. If the input is a photo of a nutrition label, extract values from the label (respect serving size — ask yourself: did the user eat one serving or the whole container? If unclear, assume one serving and note it).
5. If the input is a photo of food, estimate from visible portions.
6. Added sugar: if a product has added sugar you know about (dressings, sauces, yogurt), include it. Default to 0 only if you're confident there's none.
7. Effective protein (ep): collagen peptides = 50% of raw. Whey/meat/dairy/eggs/legumes = 100%. Mixed → weighted.
8. Return ONLY the JSON object. No backticks. No prose.`;

async function analyzeMeal({text,imageB64,imageMedia}){
  const key=LS.get("api_key");
  if(!key)throw new Error("No API key. Set one in Settings.");
  const profile=DB.get("profile")||"";
  const foodref=DB.get("foodref")||"";
  const sys=MEAL_SYSTEM+"\n\n=== USER PROFILE ===\n"+profile+"\n\n=== FOOD REFERENCE (known products) ===\n"+(foodref||"(no food reference loaded — make best-effort estimates)");
  const userContent=[];
  if(imageB64){
    userContent.push({type:"image",source:{type:"base64",media_type:imageMedia||"image/jpeg",data:imageB64}});
  }
  userContent.push({type:"text",text:text||"Analyze this meal and return the JSON."});
  const body={model:"claude-sonnet-4-20250514",max_tokens:1500,system:sys,messages:[{role:"user",content:userContent}]};
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"API error");
  let raw="";
  if(d.content&&Array.isArray(d.content)){raw=d.content.filter(b=>b.type==="text").map(b=>b.text).join("\n")}
  raw=raw.replace(/```json|```/g,"").trim();
  // Extract the first JSON object if the model added any stray text
  const m=raw.match(/\{[\s\S]*\}/);
  if(!m)throw new Error("Could not parse AI response: "+raw.slice(0,200));
  let parsed;
  try{parsed=JSON.parse(m[0])}catch(e){throw new Error("Invalid JSON from AI: "+e.message)}
  if(!parsed.items||!Array.isArray(parsed.items))throw new Error("AI response missing items array");
  // Normalize: ensure all numeric fields present
  const fields=["cal","p","ep","ca","fi","as","su","fa","sf","na","k"];
  parsed.items=parsed.items.map(it=>{
    const clean={n:it.n||"Item",note:it.note||""};
    fields.forEach(f=>{clean[f]=typeof it[f]==="number"?it[f]:(parseFloat(it[f])||0)});
    if(!it.ep&&it.p)clean.ep=clean.p;
    return clean;
  });
  return parsed;
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{const s=r.result;const i=s.indexOf(",");res({data:s.slice(i+1),media:file.type||"image/jpeg"})};
    r.onerror=()=>rej(new Error("Could not read file"));
    r.readAsDataURL(file);
  });
}

// ============================================================
// TIME PICKER (scroll-wheel style, P4)
// ============================================================
// Two scroll columns (hour, minute) + AM/PM toggle. Initializes to current time
// or the parsed `value` prop. Calls onChange("H:MM AM") whenever selection changes.
function TimePicker({value,onChange}){
  const parseTime=v=>{
    const now=new Date();
    if(!v)return {h:now.getHours()%12||12,m:now.getMinutes(),ap:now.getHours()>=12?"PM":"AM"};
    const match=String(v).match(/(\d+):(\d+)\s*(AM|PM)?/i);
    if(!match)return {h:now.getHours()%12||12,m:now.getMinutes(),ap:now.getHours()>=12?"PM":"AM"};
    let h=+match[1],m=+match[2];
    let ap=match[3]?match[3].toUpperCase():(h>=12?"PM":"AM");
    if(h>12)h=h-12;
    if(h===0)h=12;
    return {h,m,ap};
  };
  const init=parseTime(value);
  const [h,setH]=useState(init.h);
  const [m,setM]=useState(init.m);
  const [ap,setAp]=useState(init.ap);
  const hRef=useRef(null);
  const mRef=useRef(null);
  const ROW=40;

  // Position scroll columns to initial values on mount
  useEffect(()=>{
    if(hRef.current)hRef.current.scrollTop=(init.h-1)*ROW;
    if(mRef.current)mRef.current.scrollTop=init.m*ROW;
  },[]);

  // Push selection back up whenever it changes
  useEffect(()=>{
    onChange(`${h}:${String(m).padStart(2,"0")} ${ap}`);
  },[h,m,ap]);

  const hours=Array.from({length:12},(_,i)=>i+1);
  const minutes=Array.from({length:60},(_,i)=>i);

  const onScrollCol=(items,setter)=>e=>{
    const el=e.currentTarget;
    clearTimeout(el._timer);
    el._timer=setTimeout(()=>{
      const idx=Math.round(el.scrollTop/ROW);
      const clamped=Math.max(0,Math.min(idx,items.length-1));
      const val=items[clamped];
      if(val!=null)setter(val);
      // Snap to exact row position in case scroll-snap didn't finish
      const target=clamped*ROW;
      if(Math.abs(el.scrollTop-target)>2){el.scrollTop=target}
    },140);
  };

  const colStyle={height:ROW*4,overflowY:"scroll",scrollSnapType:"y mandatory",flex:1,textAlign:"center",fontFamily:"monospace",WebkitOverflowScrolling:"touch"};
  const rowStyle=active=>({height:ROW,lineHeight:ROW+"px",scrollSnapAlign:"center",color:active?C.teal:C.dim,fontWeight:active?700:400,fontSize:active?24:20,transition:"color 0.15s,font-size 0.15s"});
  const padStyle={height:ROW*1.5};

  const setNow=()=>{
    const now=new Date();
    const nh=now.getHours()%12||12;
    const nm=now.getMinutes();
    const nap=now.getHours()>=12?"PM":"AM";
    setH(nh);setM(nm);setAp(nap);
    if(hRef.current)hRef.current.scrollTop=(nh-1)*ROW;
    if(mRef.current)mRef.current.scrollTop=nm*ROW;

      React.createElement(Btn,{onClick:()=>{const v=document.getElementById("apiKeyInput").value;if(v){LS.set("api_key",v);setNeedKey(false)}}},["Save Key"])

      setShowImport(false);
      setTimeout(()=>setStatus(""),3000);

  const doExportAll=()=>{

    React.createElement("div",{style:{fontSize:14,fontWeight:700}},"Settings"),

    // Sync Key
    React.createElement("div",{style:{background:C.card,borderRadius:10,padding:14,border:`1px solid ${hasSyncKey?C.grn+"60":C.amber+"60"}`}},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:8}},"☁️ Cloud Sync"),

        React.createElement("div",{style:{fontSize:14,color:C.grn,marginBottom:8}},"✓ Syncing with key: "+getSyncKey()),
        React.createElement("div",{style:{fontSize:13,color:C.dim,marginBottom:8}},"Use the same sync key on your other devices to keep data in sync."),
        React.createElement("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
          React.createElement(Btn,{onClick:async()=>{var sk=getSyncKey();setStatus("Pushing to cloud... (key: "+sk+")");try{var data={};var h=LS.get("history");if(h)data.history=h;var p=LS.get("profile");if(p)data.profile=p;var fr=LS.get("foodref");if(fr)data.foodref=fr;var t=LS.get("today_"+todayStr());if(t)data["today_"+todayStr()]=t;var s=LS.get("supps_"+todayStr());if(s)data["supps_"+todayStr()]=s;await fetch(FB_URL+"/users/"+sk+".json",{method:"PUT",body:JSON.stringify(data)});setStatus("✓ Pushed to cloud! "+(data.history?data.history.length:0)+" days of history uploaded.")}catch(err){setStatus("❌ Error: "+err.message)}setTimeout(()=>setStatus(""),6000)},color:C.grn,style:{fontSize:14}},["⬆ Push to Cloud"]),
          React.createElement(Btn,{onClick:async()=>{var sk=getSyncKey();setStatus("Pulling from cloud... (key: "+sk+")");try{var url=FB_URL+"/users/"+sk+".json";var resp=await fetch(url);var r=await resp.json();if(r&&typeof r==="object"&&Object.keys(r).length>0){var count=0;if(r.history){setHistory(r.history);LS.set("history",r.history);setHasHist(true);count=r.history.length}if(r.profile){LS.set("profile",r.profile);setHasProfile(true)}if(r.foodref){LS.set("foodref",r.foodref);setHasFoodref(true)}setStatus("✓ Synced! "+count+" days of history loaded.")}else{setStatus("⚠ No data found at key: "+sk+". Make sure you used the same passphrase on both devices.")}}catch(err){setStatus("❌ Error: "+err.message)}setTimeout(()=>setStatus(""),6000)},color:C.blue,style:{fontSize:14}},["⬇ Pull from Cloud"]),
          React.createElement(Btn,{onClick:()=>{if(confirm("Remove sync key? Data stays on this device but stops syncing.")){localStorage.removeItem("ph_sync_key");setHasSyncKey(false)}},color:C.rose,outline:true,style:{fontSize:14}},["Disconnect"])
        )
      ):React.createElement("div",null,
        React.createElement("div",{style:{fontSize:13,color:C.dim,marginBottom:10,lineHeight:1.5}},"Choose a sync passphrase. Use the same phrase on all your devices. Your data is stored at a private path derived from this phrase."),
        React.createElement("input",{type:"text",value:syncKeyInput,onChange:e=>setSyncKeyInput(e.target.value),placeholder:"e.g. my-health-2026",
          style:{width:"100%",background:C.card2,border:`1px solid ${C.bdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:8}}),
        React.createElement(Btn,{onClick:()=>{if(syncKeyInput.trim().length>=4){var h=0;for(var i=0;i<syncKeyInput.length;i++){h=((h<<5)-h)+syncKeyInput.charCodeAt(i);h|=0}var key="u"+Math.abs(h).toString(36);LS.set("sync_key",key);setHasSyncKey(true);setStatus("✓ Sync key set! Now import your data or pull from cloud.");setTimeout(()=>setStatus(""),4000)}else{setStatus("Passphrase must be at least 4 characters")}},color:C.teal},["Set Sync Key"])
      )
    ),

    // Data status
    React.createElement("div",{style:{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:10}},"Data Status"),
      React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6}},
        React.createElement("div",{style:{fontSize:14,color:hasHist?C.grn:C.amber}},hasHist?`✓ ${history.length} days of history loaded`:"⚠ No historical data — import below"),
        React.createElement("div",{style:{fontSize:14,color:hasProfile?C.grn:C.amber}},hasProfile?"✓ Health profile loaded":"⚠ No health profile — import below"),
        React.createElement("div",{style:{fontSize:14,color:hasFoodref?C.grn:C.amber}},hasFoodref?"✓ Food reference loaded (AI meal analysis enabled)":"⚠ No food reference — AI meal estimates will be less accurate"),
        React.createElement("div",{style:{fontSize:14,color:hasKey?C.grn:C.dim}},hasKey?"✓ API key saved":"○ No API key (AI chat + meal analysis disabled)")
      )
    ),

    // Import
    React.createElement("div",{style:{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:8}},"Import Data"),
      React.createElement("div",{style:{fontSize:13,color:C.dim,marginBottom:10,lineHeight:1.5}},'Paste JSON with any of: {"history":[...], "profile":"...", "foodref":"..."}. The foodref is a markdown/text blob describing your known products — it powers AI meal analysis.'),
      !showImport&&React.createElement(Btn,{onClick:()=>setShowImport(true),color:C.teal},["📥 Import Data"]),
      showImport&&React.createElement("div",null,
        React.createElement("textarea",{value:importText,onChange:e=>setImportText(e.target.value),placeholder:'Paste JSON here...',rows:6,
          style:{width:"100%",background:C.card2,border:`1px solid ${C.bdr}`,borderRadius:8,padding:10,color:C.txt,fontSize:14,resize:"vertical",outline:"none",boxSizing:"border-box",fontFamily:"monospace",marginBottom:8}}),
        React.createElement("div",{style:{display:"flex",gap:8}},
          React.createElement(Btn,{onClick:doImport,color:C.grn},["Import"]),
          React.createElement(Btn,{onClick:()=>{setShowImport(false);setImportText("")},outline:true,color:C.dim},["Cancel"])
        )
      )
    ),

    // Export all
    React.createElement("div",{style:{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:8}},"Export All Data"),
      React.createElement("div",{style:{fontSize:13,color:C.dim,marginBottom:10,lineHeight:1.5}},"Copy all your health data to clipboard for backup or transfer to another device."),
      React.createElement(Btn,{onClick:doExportAll,color:C.blue},["📤 Export All to Clipboard"])

      React.createElement("div",{style:{fontSize:14,color:C.dim,marginBottom:8}},hasKey?"Key saved on this device only.":"Enter your Anthropic API key for AI chat."),
      !hasKey&&React.createElement("div",null,
        React.createElement("input",{type:"password",placeholder:"sk-ant-...",id:"apiKeyInput2",
          style:{width:"100%",background:C.card2,border:`1px solid ${C.bdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:8}}),
        React.createElement(Btn,{onClick:()=>{var v=document.getElementById("apiKeyInput2").value;if(v){LS.set("api_key",v);setHasKey(true);setStatus("✓ API key saved")}},color:C.teal},["Save Key"])
      ),
      hasKey&&React.createElement(Btn,{onClick:()=>{localStorage.removeItem("ph_api_key");setHasKey(false)},color:C.rose,outline:true,style:{fontSize:14}},["Remove Key"])
    ),

    // Clear data
    React.createElement("div",{style:{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:10}},"Clear Data"),
      React.createElement(Btn,{onClick:()=>{if(confirm("Clear ALL health data? Cannot be undone.")){Object.keys(localStorage).filter(k=>k.startsWith("ph_")).forEach(k=>localStorage.removeItem(k));setStatus("Data cleared. Refresh page.");setHasHist(false);setHasProfile(false)}},color:C.rose,outline:true,style:{fontSize:14}},["Clear All Data"])
    ),

    // Status message
    status&&React.createElement("div",{style:{background:status.startsWith("✓")?C.grn+"20":C.rose+"20",border:`1px solid ${status.startsWith("✓")?C.grn:C.rose}40`,borderRadius:10,padding:"12px 14px",fontSize:14,color:status.startsWith("✓")?C.grn:C.rose,textAlign:"center"}},status)
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App(){
  const [tab,setTab]=useState("today");
  const [history,setHistory]=useState([]);
  const [td,setTd]=useState({cal:0,p:0,ep:0,ca:0,fi:0,as:0,su:0,fa:0,sf:0,na:0,k:0,g:null,gReadings:[],bs:null,bd:null,pu:null,bpt:null,bpReadings:[],sl:null,ss:null,deep:null,rem:null,light:null,shr:null,bed:null,wake:null,st:null,stReadings:[],al:0,alReadings:[],ex:false,exLog:[],wt:null,wtReadings:[],meals:[]});
  const [supps,setSupps]=useState({});
  const [chatOpen,setChatOpen]=useState(false);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    (async()=>{
      // Load from localStorage first (instant)
      const saved=DB.get("today_"+todayStr());
      if(saved)setTd(saved);
      const savedS=DB.get("supps_"+todayStr());
      if(savedS)setSupps(savedS);
      let h=DB.get("history");
      if(!h&&HIST.length>0){DB.set("history",HIST);h=HIST}
      // Rollover any past-day data sitting in localStorage into history
      h=rolloverPastDays(h||[],null);
      if(h&&h.length>0)setHistory(h);
      setLoaded(true);
      // Then pull from Firebase (may override with newer data)
      if(getSyncKey()){
        const remote=await DB.pullAll();
        if(remote){
          if(remote["today_"+todayStr()])setTd(remote["today_"+todayStr()]);
          if(remote["supps_"+todayStr()])setSupps(remote["supps_"+todayStr()]);
          if(remote.history&&remote.history.length>0){h=remote.history;LS.set("history",h)}
          if(remote.profile)LS.set("profile",remote.profile);
          if(remote.foodref)LS.set("foodref",remote.foodref);
          // Second rollover pass now that we have remote data
          h=rolloverPastDays(h||[],remote);
          if(h&&h.length>0)setHistory(h);
        }
      }
    })();
  },[]);

  useEffect(()=>{if(loaded)DB.set("today_"+todayStr(),td)},[td,loaded]);
  useEffect(()=>{if(loaded)DB.set("supps_"+todayStr(),supps)},[supps,loaded]);

  const addMeal=m=>{
    if(m.cal!=null){
      setTd(p=>({...p,cal:(p.cal||0)+(m.cal||0),p:(p.p||0)+(m.p||0),ep:(p.ep||0)+(m.ep||m.p||0),ca:(p.ca||0)+(m.ca||0),fi:(p.fi||0)+(m.fi||0),as:(p.as||0)+(m.as||0),su:(p.su||0)+(m.su||0),fa:(p.fa||0)+(m.fa||0),sf:(p.sf||0)+(m.sf||0),na:(p.na||0)+(m.na||0),k:(p.k||0)+(m.k||0),meals:[...(p.meals||[]),{...m,t:new Date().toISOString()}]}));
    }
  };
  const addReading=r=>{/* readings stored with today data */};

  const tabs=[{id:"today",l:"Today",i:"📊"},{id:"trends",l:"Trends",i:"📈"},{id:"alerts",l:"Alerts",i:"🔔"},{id:"protocol",l:"Protocol",i:"📋"},{id:"export",l:"Export",i:"📤"},{id:"settings",l:"Settings",i:"⚙️"}];

  if(!loaded)return React.createElement("div",{style:{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.teal}},"Loading...");

  return React.createElement("div",{style:{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",position:"relative"}},
    // Header
    React.createElement("div",{style:{padding:"14px 16px 8px",borderBottom:`1px solid ${C.bdr}33`,flexShrink:0}},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontSize:22,fontWeight:800,color:C.teal,letterSpacing:-0.5}},"HEALTH DASH"),
          React.createElement("div",{style:{fontSize:14,color:C.dim}},new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}))
        ),
        React.createElement("button",{onClick:()=>setChatOpen(true),style:{background:C.teal,border:"none",borderRadius:20,padding:"10px 16px",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}},"💬 AI Chat")
      )
    ),
    // Content
    React.createElement("div",{style:{flex:1,overflowY:"auto",paddingBottom:80}},
      tab==="today"&&React.createElement(TodayTab,{data:td,setData:setTd,supps,setSupps,addMeal,addReading,history}),
      tab==="trends"&&React.createElement(TrendsTab,{history}),
      tab==="alerts"&&React.createElement(AlertsTab,{data:td}),
      tab==="protocol"&&React.createElement(ProtocolTab,{supps,setSupps}),
      tab==="export"&&React.createElement(ExportTab,{data:td,history}),
      tab==="settings"&&React.createElement(SettingsTab,{history,setHistory}),
    ),
    // Tab bar - fixed at bottom
    React.createElement("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:C.card,borderTop:`1px solid ${C.bdr}`,display:"flex",paddingBottom:24,paddingTop:6,zIndex:50,maxWidth:480,margin:"0 auto"}},
      tabs.map(t=>React.createElement("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,background:"none",border:"none",padding:"10px 2px 6px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
        React.createElement("span",{style:{fontSize:22}},t.i),
        React.createElement("span",{style:{fontSize:12,fontWeight:tab===t.id?700:400,color:tab===t.id?C.teal:C.dim}},t.l)
      ))
    ),
    // Chat
    React.createElement(ChatDrawer,{open:chatOpen,onClose:()=>setChatOpen(false),data:td,history})
  );
}

try{ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App))}catch(e){document.getElementById("root").innerHTML='<div style="padding:20px;color:#f43f5e;font-size:14px;line-height:1.6"><b>Startup Error:</b><br>'+e.message+'</div>';}
</script>
</body>
