<script type="text/javascript">
const {useState,useEffect,useRef,useCallback}=React;
// Recharts loaded async - may not be available immediately

// CONSTANTS
// ============================================================

const HIST=[];
// Historical data is imported via Settings tab — not stored in code

const DEFAULT_PROFILE="Health tracking dashboard. Import your health profile via Settings > Import Data to enable personalized AI chat.";
// Profile loaded from localStorage after import

// ============================================================
// STORAGE (localStorage)
// ============================================================
// ============================================================
// STORAGE: localStorage (fast) + Firebase (sync)
// ============================================================
const FB_URL="https://health-dashboard-fb552-default-rtdb.firebaseio.com";
const LS={
  get(k){try{const v=localStorage.getItem("ph_"+k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem("ph_"+k,JSON.stringify(v));return true}catch{return false}},
};
const getSyncKey=()=>LS.get("sync_key");
const FB={
  async get(k){
    const sk=getSyncKey();if(!sk)return null;
    try{const r=await fetch(`${FB_URL}/users/${sk}/${k}.json`);const d=await r.json();return d}catch{return null}
  },
  async set(k,v){
    const sk=getSyncKey();if(!sk)return;
    try{await fetch(`${FB_URL}/users/${sk}/${k}.json`,{method:"PUT",body:JSON.stringify(v)})}catch{}
  },
};
// Dual write: localStorage (instant) + Firebase (async background)
const DB={
  get(k){return LS.get(k)},
  set(k,v){LS.set(k,v);FB.set(k,v)},
  async pull(k){
    const remote=await FB.get(k);
    if(remote!=null){LS.set(k,remote);return remote}
    return LS.get(k);
  },
  async pullAll(){
    const sk=getSyncKey();if(!sk)return null;
    try{const r=await fetch(`${FB_URL}/users/${sk}.json`);const d=await r.json();return d}catch{return null}
  },
  async pushAll(data){
    const sk=getSyncKey();if(!sk)return;
    try{await fetch(`${FB_URL}/users/${sk}.json`,{method:"PUT",body:JSON.stringify(data)})}catch{}
  }
};

const todayStr=()=>new Date().toISOString().split("T")[0];
const fmtD=d=>{const dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"})};
const predictG=(sl,st,as,al,ex)=>{let g=90;if(sl<6)g+=13;else if(sl<7)g+=8;else if(sl<7.5)g+=5;else if(sl<8)g+=2;g+=Math.min((st||4)-2,5);g+=Math.min(Math.max((as||0)-10,0)/4,5);g+=Math.min((al||0)*2.5,8);if(ex)g-=7;return Math.round(g)};

// ============================================================
// SMALL COMPONENTS
// ============================================================
function Metric({label,value,unit,target,isMax,color}){
  const over=isMax&&value>target;const under=!isMax&&target&&value<target;
  const c=over?C.rose:under?C.amber:color||C.teal;
  const pct=target?Math.min((value/target)*100,110):null;
  return React.createElement("div",{style:{background:C.card,borderRadius:10,padding:"10px 12px",borderLeft:`3px solid ${c}`}},
    React.createElement("div",{style:{fontSize:11,color:C.dim,marginBottom:2}},label),
    React.createElement("div",{style:{display:"flex",alignItems:"baseline",gap:4}},
      React.createElement("span",{style:{fontSize:22,fontWeight:700,color:c,fontFamily:"monospace"}},value!=null?Math.round(value):"—"),
      unit&&React.createElement("span",{style:{fontSize:11,color:C.dim}},unit),
      target&&React.createElement("span",{style:{fontSize:10,color:C.dim,marginLeft:"auto"}},`/ ${target}${isMax?" max":""}`)
    ),
    pct!=null&&React.createElement("div",{style:{height:3,background:C.card2,borderRadius:2,marginTop:6}},
      React.createElement("div",{style:{height:3,background:c,borderRadius:2,width:`${Math.min(pct,100)}%`,transition:"width 0.5s"}}))
  );
}

function SuppCard({s,done,onTap}){
  return React.createElement("div",{onClick:onTap,style:{background:done?C.card2:C.card,borderRadius:10,padding:"10px 12px",border:`1px solid ${done?C.grn+"60":C.bdr}`,cursor:"pointer",opacity:done?0.65:1,display:"flex",alignItems:"center",gap:10}},
    React.createElement("div",{style:{width:28,height:28,borderRadius:14,background:done?C.grn:C.card2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:done?14:16,flexShrink:0,color:done?"#fff":undefined}},done?"✓":s.icon),
    React.createElement("div",{style:{flex:1,minWidth:0}},
      React.createElement("div",{style:{fontSize:13,fontWeight:600,color:done?C.dim:C.txt}},s.name),
      React.createElement("div",{style:{fontSize:10,color:C.dim}},s.time)
    )
  );
}

function Inp({label,value,onChange,placeholder,unit,type}){
  return React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"6px 0"}},
    React.createElement("span",{style:{fontSize:12,color:C.dim,width:75,flexShrink:0}},label),
    React.createElement("input",{type:type||"number",value:value,onChange:e=>onChange(e.target.value),placeholder:placeholder,
      style:{flex:1,background:C.card2,border:`1px solid ${C.bdr}`,borderRadius:8,padding:"8px 10px",color:C.txt,fontSize:14,outline:"none",fontFamily:"monospace"}}),
    unit&&React.createElement("span",{style:{fontSize:11,color:C.dim,width:35,flexShrink:0}},unit)
  );
}

function Btn({children,onClick,color,outline,style:s}){
  return React.createElement("button",{onClick,style:{background:outline?"transparent":(color||C.teal),color:outline?(color||C.teal):"#fff",border:outline?`1px solid ${color||C.teal}`:"none",borderRadius:8,padding:"10px 16px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6,...s}},children);
}

// ============================================================
// TODAY TAB
// ============================================================
function TodayTab({data,setData,supps,setSupps,addMeal,addReading}){

  const [gv,setGv]=useState("");const [gt,setGt]=useState("");
  const [bs,setBs]=useState("");const [bd,setBd]=useState("");const [bp,setBp]=useState("");

  const pending=SUPPS.filter(s=>!supps[s.id]);
  const calT=data.ex?2000:1800;

  const save=(type,vals)=>{addReading({type,...vals});setEt(null);setGv("");setGt("");setBs("");setBd("");setBp("");setSh("");setSc("");setWv("");setAv("")};

      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
        pending.map(s=>React.createElement(SuppCard,{key:s.id,s,done:false,onTap:()=>setSupps(p=>({...p,[s.id]:true}))}))
      )
    ),
    pending.length===0&&React.createElement("div",{key:"suppdone",style:{background:C.grn+"20",border:`1px solid ${C.grn}40`,borderRadius:10,padding:"8px 12px",fontSize:12,color:C.grn,textAlign:"center"}},"✓ All supplements taken today"),

        React.createElement(Metric,{label:"Protein (raw)",value:data.p,target:110,unit:"g"}),
        React.createElement(Metric,{label:"Carbs",value:data.ca,target:100,unit:"g"}),
        React.createElement(Metric,{label:"Fiber",value:data.fi,target:28,unit:"g"}),
        React.createElement(Metric,{label:"Added Sugar",value:data.as,target:20,isMax:true,unit:"g"}),
        React.createElement(Metric,{label:"Sodium",value:data.na,target:2300,isMax:true,unit:"mg"}),
        React.createElement(Metric,{label:"Potassium",value:data.k,target:3000,unit:"mg"}),
        React.createElement(Metric,{label:"Fat / Sat",value:data.fa,unit:`g / ${Math.round(data.sf||0)}g`})
      )
    ),

    // Glucose prediction
    data.sl!=null&&React.createElement("div",{key:"pred",style:{background:C.purp+"15",border:`1px solid ${C.purp}40`,borderRadius:10,padding:"10px 12px"}},
      React.createElement("div",{style:{fontSize:11,color:C.purp,fontWeight:600}},"🔮 TOMORROW'S GLUCOSE PREDICTION"),
      React.createElement("div",{style:{fontSize:24,fontWeight:700,color:C.purp,fontFamily:"monospace"}},"~"+predictG(data.sl,data.st,data.as,data.al,data.ex)),
      React.createElement("div",{style:{fontSize:10,color:C.dim}},`Sleep ${data.sl}hr, ${data.al||0} drinks${data.al>0?" ⚠️":""}, ${data.as||0}g sugar, ${data.ex?"exercised ✓":"rest day"}`)
    ),

    // Entry buttons
    React.createElement("div",{key:"btns"},
      React.createElement("div",{style:{fontSize:12,fontWeight:600,color:C.dim,marginBottom:6}},"LOG DATA"),
      React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
        [["glucose","🩸 Glucose"],["bp","💓 BP"],["sleep","😴 Sleep"],["stress","🧠 Stress"],["weight","⚖️ Weight"],["meal","🍽️ Meal"],["exercise","💪 Exercise"],["alcohol","🍺 Alcohol"]].map(([k,l])=>

    ),

    // Sleep form
    et==="sleep"&&React.createElement("div",{key:"f_sl",style:{background:C.card,borderRadius:12,padding:14,border:`1px solid ${C.bdr}`}},

    ),

    et==="exercise"&&React.createElement("div",{key:"f_ex",style:{background:C.card,borderRadius:12,padding:14,border:`1px solid ${C.bdr}`}},
      React.createElement("div",{style:{display:"flex",gap:8}},
        React.createElement(Btn,{onClick:()=>{setData(p=>({...p,ex:true}));save("exercise",{done:true})},color:C.grn},["✓ Exercise Day"]),
        React.createElement(Btn,{onClick:()=>{setData(p=>({...p,ex:false}));save("exercise",{done:false})},outline:true,color:C.dim},["Rest Day"])
      )
    ),

    // Meal entry
    et==="meal"&&React.createElement("div",{key:"f_meal",style:{background:C.card,borderRadius:12,padding:14,border:`1px solid ${C.bdr}`}},

          React.createElement("span",null,m.n),React.createElement("span",{style:{color:C.dim}},`${m.cal}cal/${m.p}g`)
        ))

        [["Glucose",data.g,"mg/dL",C.teal],["BP",data.bs?`${data.bs}/${data.bd}`:"—","",C.blue],["Pulse",data.pu,"bpm",C.purp],
         ["Sleep",data.sl,"hrs",C.amber],["Stress",data.st,"/5",C.rose],["Weight",data.wt,"lbs",C.grn]].map(([l,v,u,c])=>

            React.createElement("div",{style:{fontSize:9,color:C.dim}},u)

  return React.createElement("div",{style:{padding:"12px 16px 100px",display:"flex",flexDirection:"column",gap:14}},els);

function AlertsTab({data}){
  const [dis,setDis]=useState({});
  const alerts=[];
  if(data.na>2300)alerts.push({id:"na",msg:`⚠️ Sodium ${Math.round(data.na)}mg — over 2,300. Potassium rescue: banana, coconut water, beans.`,c:C.amber});
  if(data.as>20)alerts.push({id:"as",msg:`🍬 Added sugar ${Math.round(data.as)}g — over 20g ceiling.`,c:C.rose});
  if(data.p>0&&data.p<80)alerts.push({id:"prot",msg:`⚠️ Protein only ${Math.round(data.p)}g — add Oikos or Fairlife.`,c:C.amber});
  if(data.cal>0&&data.cal<800)alerts.push({id:"cal",msg:`🚨 Only ${Math.round(data.cal)} cal — hepatic glucose risk. Eat!`,c:C.rose});
  if(data.al>=2)alerts.push({id:"al",msg:`🍺 ${data.al} drinks — tomorrow pulse predicted 80-90. Finish by 6:45 PM!`,c:C.amber});
  if(!data.ex)alerts.push({id:"rest",msg:`Rest day — calorie target 1,800.`,c:C.blue});

    {id:"todo",msg:"📝 Try bedtime to-do list dump",c:C.amber},
    {id:"kefir",msg:"🛒 Buy Lifeway Plain Kefir + order Momentous Fiber+",c:C.blue},

    alerts.filter(a=>!dis[a.id]).map(a=>React.createElement("div",{key:a.id,style:{background:a.c+"15",border:`1px solid ${a.c}40`,borderRadius:10,padding:"10px 12px",display:"flex",gap:10}},

function ExportTab({data,history}){
  const [copied,setCopied]=useState(null);
  const todayS=()=>`Date: ${todayStr()}\nCalories: ${data.cal||0} | Protein: ${data.p||0}g raw / ${data.ep||0}g eff | Carbs: ${data.ca||0}g | Fiber: ${data.fi||0}g\nAdded Sugar: ${data.as||0}g | Fat: ${data.fa||0}g / Sat ${data.sf||0}g | Sodium: ${data.na||0}mg | K: ${data.k||0}mg\nGlucose: ${data.g||"—"} | BP: ${data.bs||"—"}/${data.bd||"—"} | Pulse: ${data.pu||"—"} | Sleep: ${data.sl||"—"}hr\nStress: ${data.st||"—"} | Alcohol: ${data.al||0} | Exercise: ${data.ex?"Yes":"No"}`;
  const weekS=()=>history.slice(-7).map(d=>`${fmtD(d.d)}: ${d.cal||"?"}cal, ${d.p||"?"}g prot, gluc ${d.g||"?"}, sleep ${d.sl||"?"}hr, Na ${d.na||"?"}mg${d.al?", "+d.al+"drinks":""}${d.ex?", exercise":""}`).join("\n");

function ChatDrawer({open,onClose,data,history}){
  const [msgs,setMsgs]=useState([]);
  const [inp,setInp]=useState("");
  const [loading,setLoading]=useState(false);
  const [needKey,setNeedKey]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight},[msgs]);
  useEffect(()=>{const k=LS.get("api_key");setNeedKey(!k)},[open]);

  const send=async()=>{
    if(!inp.trim()||loading)return;
    const key=LS.get("api_key");
    if(!key){setNeedKey(true);return}
    const userMsg=inp.trim();setInp("");
    setMsgs(p=>[...p,{role:"user",content:userMsg}]);setLoading(true);
    const ctx=`Today: Cal ${data.cal||0}, Prot ${data.p||0}g, Carbs ${data.ca||0}g, Fiber ${data.fi||0}g, Sugar ${data.as||0}g, Na ${data.na||0}mg, K ${data.k||0}mg, Glucose ${data.g||"?"}, Sleep ${data.sl||"?"}hr, Stress ${data.st||"?"}, Alcohol ${data.al||0}, Exercise ${data.ex?"yes":"no"}. Recent glucose: ${history.slice(-7).filter(d=>d.g).map(d=>fmtD(d.d)+":"+d.g).join(", ")}.`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:`You are a health assistant. ${DB.get("profile")||DEFAULT_PROFILE}\n\nCurrent:\n${ctx}\n\nBe concise, specific to the user's protocol.`,
          messages:[...msgs.map(m=>({role:m.role,content:m.content})),{role:"user",content:userMsg}]})});
      const d=await r.json();
      if(d.error){setMsgs(p=>[...p,{role:"assistant",content:`Error: ${d.error.message}`}])}
      else{const t=d.content?.map(b=>b.text||"").join("")||"No response";setMsgs(p=>[...p,{role:"assistant",content:t}])}
    }catch(e){setMsgs(p=>[...p,{role:"assistant",content:"Connection error. Check your API key and try again."}])}
    setLoading(false);
  };

  if(!open)return null;
  return React.createElement("div",{style:{position:"fixed",inset:0,background:C.bg+"f5",zIndex:100,display:"flex",flexDirection:"column"}},
    React.createElement("div",{style:{display:"flex",alignItems:"center",padding:"12px 16px",borderBottom:`1px solid ${C.bdr}`}},
      React.createElement("span",{style:{fontSize:15,fontWeight:700,flex:1}},"💬 Health Assistant"),
      React.createElement("button",{onClick:onClose,style:{background:"none",border:"none",color:C.dim,fontSize:20,cursor:"pointer"}},"✕")
    ),
    needKey&&React.createElement("div",{style:{padding:16}},
      React.createElement("div",{style:{fontSize:13,fontWeight:600,marginBottom:8}},"Enter your Anthropic API Key"),
      React.createElement("div",{style:{fontSize:11,color:C.dim,marginBottom:12,lineHeight:1.5}},"Your key is stored only on this device in localStorage. It never leaves your phone except to call the API."),
      React.createElement("input",{type:"password",placeholder:"sk-ant-...",id:"apiKeyInput",style:{width:"100%",background:C.card2,border:`1px solid ${C.bdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:8}}),
      React.createElement(Btn,{onClick:()=>{const v=document.getElementById("apiKeyInput").value;if(v){LS.set("api_key",v);setNeedKey(false)}}},["Save Key"])
    ),
    !needKey&&React.createElement("div",{ref,style:{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10}},
      msgs.length===0&&React.createElement("div",{style:{color:C.dim,fontSize:12,textAlign:"center",marginTop:40}},"Ask about your health data, protocol, or targets."),
      msgs.map((m,i)=>React.createElement("div",{key:i,style:{alignSelf:m.role==="user"?"flex-end":"flex-start",background:m.role==="user"?C.teal:C.card,borderRadius:12,padding:"8px 12px",maxWidth:"85%",fontSize:13,lineHeight:1.5,whiteSpace:"pre-wrap"}},m.content)),
      loading&&React.createElement("div",{style:{alignSelf:"flex-start",background:C.card,borderRadius:12,padding:"8px 12px",fontSize:13,color:C.dim}},"Thinking...")
    ),
    !needKey&&React.createElement("div",{style:{padding:"10px 16px",borderTop:`1px solid ${C.bdr}`,display:"flex",gap:8}},
      React.createElement("input",{value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>e.key==="Enter"&&send(),placeholder:"Ask about your health...",
        style:{flex:1,background:C.card2,border:`1px solid ${C.bdr}`,borderRadius:20,padding:"10px 14px",color:C.txt,fontSize:13,outline:"none"}}),
      React.createElement("button",{onClick:send,disabled:loading,style:{background:C.teal,border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",fontSize:16}},"→")
    )
  );
}

        React.createElement("div",{style:{fontSize:11,color:C.dim,marginBottom:10,lineHeight:1.5}},"Choose a sync passphrase. Use the same phrase on all your devices. Your data is stored at a private path derived from this phrase."),
        React.createElement("input",{type:"text",value:syncKeyInput,onChange:e=>setSyncKeyInput(e.target.value),placeholder:"e.g. my-health-2026",
          style:{width:"100%",background:C.card2,border:`1px solid ${C.bdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:8}}),
        React.createElement(Btn,{onClick:()=>{if(syncKeyInput.trim().length>=4){var h=0;for(var i=0;i<syncKeyInput.length;i++){h=((h<<5)-h)+syncKeyInput.charCodeAt(i);h|=0}var key="u"+Math.abs(h).toString(36);LS.set("sync_key",key);setHasSyncKey(true);setStatus("✓ Sync key set! Now import your data or pull from cloud.");setTimeout(()=>setStatus(""),4000)}else{setStatus("Passphrase must be at least 4 characters")}},color:C.teal},["Set Sync Key"])
      )
    ),

    // Data status
    React.createElement("div",{style:{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}},
      React.createElement("div",{style:{fontSize:13,fontWeight:600,marginBottom:10}},"Data Status"),
      React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6}},
        React.createElement("div",{style:{fontSize:12,color:hasHist?C.grn:C.amber}},hasHist?`✓ ${history.length} days of history loaded`:"⚠ No historical data — import below"),
        React.createElement("div",{style:{fontSize:12,color:hasProfile?C.grn:C.amber}},hasProfile?"✓ Health profile loaded":"⚠ No health profile — import below"),
        React.createElement("div",{style:{fontSize:12,color:hasKey?C.grn:C.dim}},hasKey?"✓ API key saved":"○ No API key (AI chat disabled)")
      )
    ),

    // Import
    React.createElement("div",{style:{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}},
      React.createElement("div",{style:{fontSize:13,fontWeight:600,marginBottom:6}},"Import Data"),
      React.createElement("div",{style:{fontSize:11,color:C.dim,marginBottom:10,lineHeight:1.5}},'Paste the JSON data from your Claude conversation. It should contain {"history":[...],"profile":"..."}.'),
      !showImport&&React.createElement(Btn,{onClick:()=>setShowImport(true),color:C.teal},["📥 Import Data"]),
      showImport&&React.createElement("div",null,
        React.createElement("textarea",{value:importText,onChange:e=>setImportText(e.target.value),placeholder:'Paste JSON here...',rows:6,
          style:{width:"100%",background:C.card2,border:`1px solid ${C.bdr}`,borderRadius:8,padding:10,color:C.txt,fontSize:11,resize:"vertical",outline:"none",boxSizing:"border-box",fontFamily:"monospace",marginBottom:8}}),
        React.createElement("div",{style:{display:"flex",gap:8}},
          React.createElement(Btn,{onClick:doImport,color:C.grn},["Import"]),
          React.createElement(Btn,{onClick:()=>{setShowImport(false);setImportText("")},outline:true,color:C.dim},["Cancel"])
        )
      )
    ),

    // Export all
    React.createElement("div",{style:{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}},
      React.createElement("div",{style:{fontSize:13,fontWeight:600,marginBottom:6}},"Export All Data"),
      React.createElement("div",{style:{fontSize:11,color:C.dim,marginBottom:10,lineHeight:1.5}},"Copy all your health data to clipboard for backup or transfer to another device."),
      React.createElement(Btn,{onClick:doExportAll,color:C.blue},["📤 Export All to Clipboard"])
    ),

    // API Key
    React.createElement("div",{style:{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}},
      React.createElement("div",{style:{fontSize:13,fontWeight:600,marginBottom:8}},"API Key"),
      React.createElement("div",{style:{fontSize:11,color:C.dim,marginBottom:8}},hasKey?"Key saved on this device only.":"Enter your Anthropic API key for AI chat."),
      !hasKey&&React.createElement("div",null,
        React.createElement("input",{type:"password",placeholder:"sk-ant-...",id:"apiKeyInput2",
          style:{width:"100%",background:C.card2,border:`1px solid ${C.bdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:8}}),
        React.createElement(Btn,{onClick:()=>{var v=document.getElementById("apiKeyInput2").value;if(v){LS.set("api_key",v);setHasKey(true);setStatus("✓ API key saved")}},color:C.teal},["Save Key"])
      ),
      hasKey&&React.createElement(Btn,{onClick:()=>{localStorage.removeItem("ph_api_key");setHasKey(false)},color:C.rose,outline:true,style:{fontSize:12}},["Remove Key"])
    ),

    // Clear data
    React.createElement("div",{style:{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}},
      React.createElement("div",{style:{fontSize:13,fontWeight:600,marginBottom:8}},"Clear Data"),
      React.createElement(Btn,{onClick:()=>{if(confirm("Clear ALL health data? Cannot be undone.")){Object.keys(localStorage).filter(k=>k.startsWith("ph_")).forEach(k=>localStorage.removeItem(k));setStatus("Data cleared. Refresh page.");setHasHist(false);setHasProfile(false)}},color:C.rose,outline:true,style:{fontSize:12}},["Clear All Data"])
    ),

    // Status message
    status&&React.createElement("div",{style:{background:status.startsWith("✓")?C.grn+"20":C.rose+"20",border:`1px solid ${status.startsWith("✓")?C.grn:C.rose}40`,borderRadius:10,padding:"10px 12px",fontSize:12,color:status.startsWith("✓")?C.grn:C.rose,textAlign:"center"}},status)
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App(){
  const [tab,setTab]=useState("today");
  const [history,setHistory]=useState([]);
  const [td,setTd]=useState({cal:0,p:0,ep:0,ca:0,fi:0,as:0,su:0,fa:0,sf:0,na:0,k:0,g:null,bs:null,bd:null,pu:null,sl:null,ss:null,st:null,al:0,ex:false,wt:null,meals:[]});
  const [supps,setSupps]=useState({});
  const [chatOpen,setChatOpen]=useState(false);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    (async()=>{
      // Load from localStorage first (instant)
      const saved=DB.get("today_"+todayStr());
      if(saved)setTd(saved);
      const savedS=DB.get("supps_"+todayStr());
      if(savedS)setSupps(savedS);
      const h=DB.get("history");
      if(h&&h.length>0)setHistory(h);
      else if(HIST.length>0){DB.set("history",HIST);setHistory(HIST)}
      setLoaded(true);
      // Then pull from Firebase (may override with newer data)
      if(getSyncKey()){
        const remote=await DB.pullAll();
        if(remote){
          if(remote["today_"+todayStr()])setTd(remote["today_"+todayStr()]);
          if(remote["supps_"+todayStr()])setSupps(remote["supps_"+todayStr()]);
          if(remote.history&&remote.history.length>0){setHistory(remote.history);LS.set("history",remote.history)}
          if(remote.profile)LS.set("profile",remote.profile);
        }
      }
    })();
  },[]);

  useEffect(()=>{if(loaded)DB.set("today_"+todayStr(),td)},[td,loaded]);
  useEffect(()=>{if(loaded)DB.set("supps_"+todayStr(),supps)},[supps,loaded]);

  const addMeal=m=>{
    if(m.cal!=null){
      setTd(p=>({...p,cal:(p.cal||0)+(m.cal||0),p:(p.p||0)+(m.p||0),ep:(p.ep||0)+(m.ep||m.p||0),ca:(p.ca||0)+(m.ca||0),fi:(p.fi||0)+(m.fi||0),as:(p.as||0)+(m.as||0),su:(p.su||0)+(m.su||0),fa:(p.fa||0)+(m.fa||0),sf:(p.sf||0)+(m.sf||0),na:(p.na||0)+(m.na||0),k:(p.k||0)+(m.k||0),meals:[...(p.meals||[]),{...m,t:new Date().toISOString()}]}));
    }
  };
  const addReading=r=>{/* readings stored with today data */};

  const tabs=[{id:"today",l:"Today",i:"📊"},{id:"trends",l:"Trends",i:"📈"},{id:"alerts",l:"Alerts",i:"🔔"},{id:"protocol",l:"Protocol",i:"📋"},{id:"export",l:"Export",i:"📤"},{id:"settings",l:"Settings",i:"⚙️"}];

  if(!loaded)return React.createElement("div",{style:{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.teal}},"Loading...");

  return React.createElement("div",{style:{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",position:"relative"}},
    // Header
    React.createElement("div",{style:{padding:"14px 16px 8px",borderBottom:`1px solid ${C.bdr}33`,flexShrink:0}},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontSize:18,fontWeight:800,color:C.teal,letterSpacing:-0.5}},"HEALTH DASH"),
          React.createElement("div",{style:{fontSize:11,color:C.dim}},new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}))
        ),
        React.createElement("button",{onClick:()=>setChatOpen(true),style:{background:C.teal,border:"none",borderRadius:20,padding:"8px 14px",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}},"💬 AI Chat")
      )
    ),
    // Content
    React.createElement("div",{style:{flex:1,overflowY:"auto",paddingBottom:80}},
      tab==="today"&&React.createElement(TodayTab,{data:td,setData:setTd,supps,setSupps,addMeal,addReading}),
      tab==="trends"&&React.createElement(TrendsTab,{history}),
      tab==="alerts"&&React.createElement(AlertsTab,{data:td}),
      tab==="protocol"&&React.createElement(ProtocolTab,{supps,setSupps}),
      tab==="export"&&React.createElement(ExportTab,{data:td,history}),
      tab==="settings"&&React.createElement(SettingsTab,{history,setHistory}),
    ),
    // Tab bar - fixed at bottom
    React.createElement("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:C.card,borderTop:`1px solid ${C.bdr}`,display:"flex",paddingBottom:24,paddingTop:6,zIndex:50,maxWidth:480,margin:"0 auto"}},
      tabs.map(t=>React.createElement("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,background:"none",border:"none",padding:"10px 2px 6px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
        React.createElement("span",{style:{fontSize:16}},t.i),
        React.createElement("span",{style:{fontSize:9,fontWeight:tab===t.id?700:400,color:tab===t.id?C.teal:C.dim}},t.l)
      ))
    ),
    // Chat
    React.createElement(ChatDrawer,{open:chatOpen,onClose:()=>setChatOpen(false),data:td,history})
  );
}

try{ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App))}catch(e){document.getElementById("root").innerHTML='<div style="padding:20px;color:#f43f5e;font-size:14px;line-height:1.6"><b>Startup Error:</b><br>'+e.message+'</div>';}
</script>
</body>
</html>
